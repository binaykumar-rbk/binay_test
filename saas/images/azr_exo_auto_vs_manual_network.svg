<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <rect width="920" height="640" fill="#F4F7FB" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="920" height="64" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="48" width="920" height="16" fill="#1B2A4A"/>
  <text x="460" y="27" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">Exocompute Networking Setup: Choose Your Method</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#8BB8E8">Make this choice in RSC when adding your Azure cloud account. Automated networking is selected by default.</text>

  <!-- PERMANENT WARNING BANNER -->
  <rect x="14" y="76" width="892" height="52" fill="#B71C1C" rx="6"/>
  <text x="460" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">WARNING: This choice is permanent.</text>
  <text x="460" y="116" text-anchor="middle" font-size="10" fill="#FFCDD2">After you add the Azure cloud account, you cannot change the networking method without deleting and re-adding the account.</text>

  <!-- START NODE -->
  <rect x="320" y="140" width="280" height="40" fill="#1B2A4A" rx="20"/>
  <text x="460" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Start: Adding Azure cloud account</text>
  <!-- Arrow straight down from start node to diamond top -->
  <line x1="460" y1="180" x2="460" y2="207" stroke="#374151" stroke-width="2"/>
  <polygon points="454,204 466,204 460,212" fill="#374151"/>

  <!-- Decision diamond: center (460,248), half-w=160, half-h=38 -->
  <!-- Points: top(460,210), right(620,248), bottom(460,286), left(300,248) -->
  <polygon points="460,210 620,248 460,286 300,248" fill="#E8F4FF" stroke="#0076CE" stroke-width="2"/>
  <text x="460" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Can RSC create Azure resources</text>
  <text x="460" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">in your subscription?</text>

  <!--
    YES branch: LEFT from diamond left point (300,248) → corner at (180,248) → DOWN to box top (180,304)
    ONE arrowhead only: at the bottom, pointing down into the Automated box
  -->
  <line x1="300" y1="248" x2="180" y2="248" stroke="#2E7D32" stroke-width="2"/>
  <text x="238" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">YES</text>
  <line x1="180" y1="248" x2="180" y2="298" stroke="#2E7D32" stroke-width="2"/>
  <!-- Single arrowhead at bottom: tip at y=308, base at y=296 -->
  <polygon points="174,296 186,296 180,308" fill="#2E7D32"/>

  <!--
    NO branch: RIGHT from diamond right point (620,248) → corner at (737,248) → DOWN to box top (737,304)
    ONE arrowhead only: at the bottom, pointing down into the Manual box center
    737 = 568 + 338/2 (center of manual box)
  -->
  <line x1="620" y1="248" x2="737" y2="248" stroke="#C62828" stroke-width="2"/>
  <text x="676" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">NO</text>
  <line x1="737" y1="248" x2="737" y2="298" stroke="#C62828" stroke-width="2"/>
  <!-- Single arrowhead at bottom: tip at y=308, base at y=296 -->
  <polygon points="731,296 743,296 737,308" fill="#C62828"/>

  <!-- ═══ AUTOMATED PATH BOX (left): x=14, y=304, w=332, h=292 ═══ -->
  <rect x="14" y="304" width="332" height="292" fill="#FFFFFF" rx="8" stroke="#2E7D32" stroke-width="2"/>
  <!-- Header -->
  <rect x="14" y="304" width="332" height="40" fill="#2E7D32" rx="8"/>
  <rect x="14" y="328" width="332" height="16" fill="#2E7D32"/>
  <text x="180" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Automated Networking (Recommended)</text>

  <!-- Badge: lowercase "selected" -->
  <rect x="24" y="352" width="312" height="22" fill="#C8E6C9" rx="4"/>
  <text x="180" y="367" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Keep "Automated networking setup" selected (default)</text>

  <!-- What RSC creates -->
  <text x="30" y="392" font-size="11" font-weight="bold" fill="#1B5E20">RSC automatically provisions:</text>
  <rect x="24" y="398" width="312" height="24" fill="#E8F5E9" rx="4"/>
  <text x="34" y="414" font-size="10" fill="#333">VNet with address space 10.0.0.0/21</text>
  <rect x="24" y="426" width="312" height="24" fill="#E8F5E9" rx="4"/>
  <text x="34" y="442" font-size="10" fill="#333">Subnet and Network Security Group (NSG)</text>
  <rect x="24" y="454" width="312" height="24" fill="#E8F5E9" rx="4"/>
  <text x="34" y="470" font-size="10" fill="#333">All required outbound security rules</text>
  <rect x="24" y="482" width="312" height="24" fill="#E8F5E9" rx="4"/>
  <text x="34" y="498" font-size="10" fill="#333">Service endpoints for Storage and SQL</text>

  <!-- Limitation box -->
  <rect x="24" y="514" width="312" height="68" fill="#FFF3E0" rx="4" stroke="#FF8F00" stroke-width="1"/>
  <text x="180" y="532" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Limitation: Fixed CIDR 10.0.0.0/21</text>
  <text x="180" y="548" text-anchor="middle" font-size="9" fill="#555">Not suitable if VNet peering is needed</text>
  <text x="180" y="562" text-anchor="middle" font-size="9" fill="#555">(SQL MI, app-consistent backups) or if</text>
  <text x="180" y="576" text-anchor="middle" font-size="9" fill="#555">10.0.0.0/21 conflicts with existing VNets.</text>

  <!-- ═══ MANUAL PATH BOX (right): x=568, y=304, w=338, h=292 ═══ -->
  <rect x="568" y="304" width="338" height="292" fill="#FFFFFF" rx="8" stroke="#C62828" stroke-width="2"/>
  <!-- Header -->
  <rect x="568" y="304" width="338" height="40" fill="#C62828" rx="8"/>
  <rect x="568" y="328" width="338" height="16" fill="#C62828"/>
  <text x="737" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Manual Networking Setup</text>

  <!-- Badge: updated wording, font-size 9 to fit -->
  <rect x="578" y="352" width="318" height="22" fill="#FFCDD2" rx="4"/>
  <text x="737" y="367" text-anchor="middle" font-size="9" font-weight="bold" fill="#B71C1C">Clear "Automated networking setup" when adding account</text>

  <!-- Steps heading -->
  <text x="584" y="394" font-size="11" font-weight="bold" fill="#C62828">You must complete 3 steps manually:</text>

  <!--
    Numbered list with hanging indent:
    Number "N." at x=588 (left-aligned)
    Text starts at x=606 (18px after number position)
    Continuation lines also at x=606 to align under the text
  -->

  <!-- Step 1 -->
  <rect x="578" y="402" width="318" height="50" fill="#FFEBEE" rx="4"/>
  <text x="590" y="420" font-size="10" fill="#333">1.</text>
  <text x="606" y="420" font-size="10" fill="#333">Evaluate options (localized/centralized,</text>
  <text x="606" y="436" font-size="10" fill="#333">ACR/PCR, VNet choices)</text>

  <!-- Step 2 -->
  <rect x="578" y="456" width="318" height="50" fill="#FFEBEE" rx="4"/>
  <text x="590" y="474" font-size="10" fill="#333">2.</text>
  <text x="606" y="474" font-size="10" fill="#333">Configure VNet, subnet, NSG, firewall,</text>
  <text x="606" y="490" font-size="10" fill="#333">CNI overlay, vCPU quotas</text>

  <!-- Step 3 -->
  <rect x="578" y="510" width="318" height="50" fill="#FFEBEE" rx="4"/>
  <text x="590" y="528" font-size="10" fill="#333">3.</text>
  <text x="606" y="528" font-size="10" fill="#333">Configure Exocompute host subscription</text>
  <text x="606" y="544" font-size="10" fill="#333">in RSC and map application subscriptions</text>

  <!-- See link — exact topic name -->
  <rect x="578" y="564" width="318" height="24" fill="#FFF3E0" rx="4" stroke="#FF8F00" stroke-width="1"/>
  <text x="737" y="580" text-anchor="middle" font-size="10" fill="#E65100">See: Configure Exocompute on Azure</text>

  <!-- Bottom note -->
  <rect x="14" y="606" width="892" height="26" fill="#EEF2F7" rx="4"/>
  <text x="460" y="623" text-anchor="middle" font-size="10" fill="#555">Both methods use Azure Kubernetes Service (AKS). The method controls who creates and manages the networking resources.</text>
</svg>
