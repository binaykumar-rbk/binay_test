<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <rect width="960" height="600" fill="#F4F7FB" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="960" height="64" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="48" width="960" height="16" fill="#1B2A4A"/>
  <text x="480" y="27" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">Private AKS Cluster: DNS Architecture</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" fill="#8BB8E8">How the AKS API server FQDN resolves within your VNet — standard setup vs. hub-and-spoke with custom DNS.</text>

  <!-- SCENARIO LABELS -->
  <rect x="14" y="76" width="444" height="28" fill="#2E7D32" rx="4"/>
  <text x="236" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Scenario A — Default (Standard Setup)</text>
  <rect x="502" y="76" width="444" height="28" fill="#1565C0" rx="4"/>
  <text x="724" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Scenario B — Hub-and-Spoke (Custom DNS)</text>

  <!-- SCENARIO A box: x=14, y=112, w=444, h=397 (ends at y=509) -->
  <rect x="14" y="112" width="444" height="397" fill="#FFFFFF" rx="8" stroke="#2E7D32" stroke-width="2"/>
  <text x="236" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Single VNet (Exocompute VNet)</text>

  <!-- AKS Cluster box: centered at x=236 (x=91, w=290) -->
  <rect x="91" y="144" width="290" height="80" fill="#E8F5E9" rx="6" stroke="#43A047" stroke-width="1.5"/>
  <text x="236" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Private AKS Cluster</text>
  <text x="236" y="183" text-anchor="middle" font-size="10" fill="#333">API server: private endpoint only</text>
  <text x="236" y="198" text-anchor="middle" font-size="10" fill="#333">Not accessible from internet</text>
  <text x="236" y="214" text-anchor="middle" font-size="9" fill="#555">Cluster name prefix: Rubrik-C3-</text>

  <!-- Arrow down to DNS zone (centered at x=236) -->
  <line x1="236" y1="224" x2="236" y2="240" stroke="#43A047" stroke-width="2"/>
  <polygon points="230,237 242,237 236,247" fill="#43A047"/>
  <text x="186" y="235" font-size="9" fill="#43A047">Auto-linked</text>

  <!-- Private DNS Zone auto-created: x=26, y=248, w=420, h=64 -->
  <rect x="26" y="248" width="420" height="64" fill="#C8E6C9" rx="6" stroke="#43A047" stroke-width="1.5"/>
  <text x="236" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Private DNS Zone (auto-created)</text>
  <text x="236" y="287" text-anchor="middle" font-size="10" fill="#333">privatelink.&lt;region&gt;.azmk8s.io</text>
  <text x="236" y="303" text-anchor="middle" font-size="9" fill="#555">Created in AKS node resource group: MC_&lt;resource-group&gt;_&lt;cluster-name&gt;_&lt;region&gt;</text>

  <!-- Linked to Exocompute VNet -->
  <rect x="26" y="322" width="420" height="44" fill="#E8F5E9" rx="4" stroke="#43A047" stroke-width="1"/>
  <text x="236" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Private DNS Zone linked to Exocompute VNet</text>
  <text x="236" y="358" text-anchor="middle" font-size="9" fill="#555">Worker nodes resolve master node FQDN via this private zone</text>

  <!-- Policy warning -->
  <rect x="26" y="376" width="420" height="38" fill="#FFEBEE" rx="4" stroke="#EF5350" stroke-width="1"/>
  <text x="236" y="393" text-anchor="middle" font-size="10" font-weight="bold" fill="#C62828">Azure policy must allow private DNS zone creation</text>
  <text x="236" y="407" text-anchor="middle" font-size="9" fill="#555">If policy denies Microsoft.Network/privateDnsZones, AKS cluster launch fails.</text>

  <!-- Fix box -->
  <rect x="26" y="422" width="420" height="50" fill="#E3F2FD" rx="4" stroke="#1565C0" stroke-width="1"/>
  <text x="236" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Fix: Add policy exemption for Exocompute node RG</text>
  <text x="236" y="455" text-anchor="middle" font-size="9" fill="#333">Scope the exemption to the AKS node resource group (MC_...).</text>
  <text x="236" y="468" text-anchor="middle" font-size="9" fill="#333">Or use Scenario B with a pre-existing custom DNS zone.</text>

  <!-- Result: inside Scenario A parent (parent ends y=509, result ends y=504) -->
  <rect x="26" y="482" width="420" height="22" fill="#C8E6C9" rx="4"/>
  <text x="236" y="497" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Result: DNS resolves automatically. No manual DNS config required.</text>

  <!-- SCENARIO B box: x=502, y=112, w=444, h=397 (ends at y=509) -->
  <rect x="502" y="112" width="444" height="397" fill="#FFFFFF" rx="8" stroke="#1565C0" stroke-width="2"/>
  <text x="724" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Hub-and-Spoke Network Model</text>

  <!-- Spoke VNet: x=514, y=144, w=198, h=120 (right edge=712) -->
  <rect x="514" y="144" width="198" height="120" fill="#E3F2FD" rx="6" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="613" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Spoke VNet</text>
  <text x="613" y="178" text-anchor="middle" font-size="9" fill="#555">(Exocompute lives here)</text>
  <rect x="524" y="186" width="178" height="70" fill="#BBDEFB" rx="4"/>
  <text x="613" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Private AKS Cluster</text>
  <text x="613" y="220" text-anchor="middle" font-size="9" fill="#333">API server in spoke VNet</text>
  <text x="613" y="234" text-anchor="middle" font-size="9" fill="#C62828">Policy may block DNS zone</text>
  <text x="613" y="247" text-anchor="middle" font-size="9" fill="#C62828">auto-creation here</text>

  <!-- Hub VNet: x=748, y=144, w=194, h=120 (left edge=748, gap from spoke=36px) -->
  <rect x="748" y="144" width="194" height="120" fill="#E8F4FF" rx="6" stroke="#1565C0" stroke-width="1.5"/>
  <text x="845" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Hub VNet</text>
  <text x="845" y="178" text-anchor="middle" font-size="9" fill="#555">(shared services)</text>
  <rect x="758" y="186" width="174" height="70" fill="#BBDEFB" rx="4"/>
  <text x="845" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Custom DNS Server</text>
  <text x="845" y="220" text-anchor="middle" font-size="9" fill="#333">Resolves DNS for spoke VNet</text>
  <text x="845" y="234" text-anchor="middle" font-size="9" fill="#333">Must forward: privatelink.*.azmk8s.io</text>
  <text x="845" y="247" text-anchor="middle" font-size="9" fill="#555">→ to Azure DNS 168.63.129.16</text>

  <!-- VNet Peering arrow: fully in the 36px gap between x=712 and x=748 -->
  <line x1="712" y1="204" x2="736" y2="204" stroke="#374151" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="736,199 748,204 736,209" fill="#374151"/>
  <text x="730" y="194" text-anchor="middle" font-size="8" fill="#374151">Peering</text>

  <!-- Custom DNS Zone box: x=514, y=296, w=420, h=64 (moved down 12px for label clearance) -->
  <rect x="514" y="296" width="420" height="64" fill="#FFF8E1" rx="6" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="724" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Custom Private DNS Zone (pre-existing)</text>
  <text x="724" y="332" text-anchor="middle" font-size="9" fill="#333">privatelink.&lt;region&gt;.azmk8s.io (or subzone variant)</text>
  <text x="724" y="346" text-anchor="middle" font-size="9" fill="#555">Must exist before AKS setup · Linked to spoke VNet AND hub VNet</text>
  <text x="724" y="358" text-anchor="middle" font-size="9" fill="#555">Zone must be in Exocompute subscription (or separate if manually configured)</text>

  <!-- Arrows from Spoke and Hub VNet down to Custom DNS Zone (tips stop at box top y=296) -->
  <line x1="613" y1="264" x2="613" y2="290" stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="607,290 619,290 613,296" fill="#FF8F00"/>
  <line x1="845" y1="264" x2="845" y2="290" stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="839,290 851,290 845,296" fill="#FF8F00"/>
  <text x="729" y="279" text-anchor="middle" font-size="8" fill="#FF8F00">Linked to both VNets</text>

  <!-- Configuration in RSC (merged: DNS zone ID + permission group): y=370, h=86 -->
  <rect x="514" y="370" width="420" height="86" fill="#E8F4FF" rx="4" stroke="#0076CE" stroke-width="1"/>
  <text x="724" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">Configuration in RSC</text>
  <text x="524" y="404" font-size="9" fill="#333">1. Enable permission group: AKS custom private DNS zone</text>
  <text x="534" y="417" font-size="9" fill="#555">Grants RSC: read/write/delete on privateDnsZones, A records, VNet links</text>
  <text x="524" y="432" font-size="9" fill="#333">2. Add the DNS zone Azure resource ID to the "Private DNS Zone ID" field in Exocompute.</text>

  <!-- Scenario B result: inside parent (parent ends y=509, result ends y=488) -->
  <rect x="514" y="466" width="420" height="22" fill="#BBDEFB" rx="4"/>
  <text x="724" y="481" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Result: AKS resolves FQDN even with hub DNS and no auto-zone creation.</text>

  <!-- Footer (moved to y=520 to clear extended parent boxes) -->
  <rect x="14" y="520" width="932" height="70" fill="#F8FAFB" rx="6" stroke="#CBD5E0" stroke-width="1"/>
  <text x="480" y="538" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">When to use each scenario:</text>
  <text x="24" y="554" font-size="9" fill="#333">Scenario A: Use when DNS zone creation is allowed in your subscription. Simple setup — no manual DNS configuration needed.</text>
  <text x="24" y="569" font-size="9" fill="#333">Scenario B: Use when policy blocks DNS zone creation, you use a hub-and-spoke model with a shared DNS server in the hub VNet, or compliance requires a pre-existing managed zone.</text>
</svg>
