<?xml version="1.0" encoding="UTF-8"?>
<!--
  Azure Workloads — Your Protection Journey
  Canvas: 1200 × 500  |  Custom Pattern: Journey-style 3-column overview
  Rubrik Aura Design System  |  Inspired by Salesforce Einstein AI journey page

  Card layout:
    Card 1 (Get started):        x=40,  w=350, icon cx=215
    Card 2 (Set up and protect): x=420, w=350, icon cx=595
    Card 3 (Manage and recover): x=800, w=350, icon cx=975
  Journey panels: y=88 to y=260
  Icon circles: cy=175, r=48
  Content area: y=275 to y=430
  Footer: y=478
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500"
     viewBox="0 0 1200 500"
     font-family="Segoe UI, Calibri, Arial, sans-serif">

  <defs>
    <!-- Panel gradient: light cool blue fading to SVG background -->
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCE0F0"/>
      <stop offset="100%" stop-color="#F4F7FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#F4F7FA" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="72" fill="#0A2347" rx="12"/>
  <rect x="0" y="60" width="1200" height="12" fill="#0A2347"/>
  <rect x="0" y="69" width="1200" height="3" fill="#09A8B8"/>
  <text x="600" y="38" font-size="19" font-weight="bold" fill="#FFFFFF"
        text-anchor="middle" letter-spacing="0.3">Microsoft Azure Workloads &#x2014; Your Protection Journey</text>
  <text x="600" y="57" font-size="11" fill="#8AACCC" text-anchor="middle">Follow the phases below to plan, implement, and manage Azure workload protection in RSC</text>

  <!-- ===== JOURNEY PANELS ===== -->
  <rect x="40"  y="88" width="350" height="172" fill="url(#panelGrad)" rx="10"/>
  <rect x="420" y="88" width="350" height="172" fill="url(#panelGrad)" rx="10"/>
  <rect x="800" y="88" width="350" height="172" fill="url(#panelGrad)" rx="10"/>

  <!-- ===== JOURNEY PATH — wavy dashed connector ===== -->
  <path d="M 215,175 C 340,145 470,145 595,175 C 720,145 850,145 975,175"
        stroke="#09A8B8" stroke-width="3" stroke-dasharray="10,7" fill="none"/>

  <!-- ===== ICON CIRCLES ===== -->

  <!-- Card 1: Get started — rocket/launch icon -->
  <circle cx="215" cy="175" r="48" fill="#0A2347" stroke="#09A8B8" stroke-width="2.5"/>
  <g transform="translate(215,175)">
    <!-- Rocket nose -->
    <polygon points="0,-34 -9,-16 9,-16" fill="white"/>
    <!-- Rocket body -->
    <rect x="-9" y="-16" width="18" height="28" rx="4" fill="white"/>
    <!-- Left fin -->
    <polygon points="-9,8 -20,20 -9,20" fill="white" opacity="0.8"/>
    <!-- Right fin -->
    <polygon points="9,8 20,20 9,20" fill="white" opacity="0.8"/>
    <!-- Porthole window -->
    <circle cx="0" cy="-2" r="5" fill="#09A8B8"/>
    <!-- Exhaust flame -->
    <ellipse cx="0" cy="22" rx="5" ry="7" fill="#09A8B8" opacity="0.75"/>
  </g>

  <!-- Card 2: Set up and protect — shield + checkmark icon -->
  <circle cx="595" cy="175" r="48" fill="#0A2347" stroke="#09A8B8" stroke-width="2.5"/>
  <g transform="translate(595,175)">
    <!-- Shield outline -->
    <path d="M 0,-28 L -20,-13 L -20,3 C -20,19 -8,29 0,33 C 8,29 20,19 20,3 L 20,-13 Z"
          fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
    <!-- Checkmark inside shield -->
    <path d="M -10,5 L -2,15 L 12,-6"
          fill="none" stroke="white" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Card 3: Manage and recover — circular refresh arrows -->
  <circle cx="975" cy="175" r="48" fill="#0A2347" stroke="#09A8B8" stroke-width="2.5"/>
  <g transform="translate(975,175)">
    <!-- Top semicircle: left to right, going clockwise (through top) -->
    <path d="M -22,0 A 22,22 0 0,1 22,0"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Arrowhead at right (pointing downward — clockwise direction) -->
    <polygon points="16,-6 24,0 16,6" fill="white"/>
    <!-- Bottom semicircle: right to left, going clockwise (through bottom) -->
    <path d="M 22,0 A 22,22 0 0,1 -22,0"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Arrowhead at left (pointing upward — clockwise direction) -->
    <polygon points="-16,6 -24,0 -16,-6" fill="white"/>
  </g>

  <!-- ===== CATEGORY TITLES ===== -->
  <text x="215" y="290" font-size="15" font-weight="bold" fill="#0A2347"
        text-anchor="middle">Get started</text>
  <text x="595" y="290" font-size="15" font-weight="bold" fill="#0A2347"
        text-anchor="middle">Set up and protect</text>
  <text x="975" y="290" font-size="15" font-weight="bold" fill="#0A2347"
        text-anchor="middle">Manage and recover</text>

  <!-- Dividers below titles -->
  <line x1="55"  y1="300" x2="375" y2="300" stroke="#C8D8E8" stroke-width="1"/>
  <line x1="435" y1="300" x2="755" y2="300" stroke="#C8D8E8" stroke-width="1"/>
  <line x1="815" y1="300" x2="1135" y2="300" stroke="#C8D8E8" stroke-width="1"/>

  <!-- ===== TOPIC LINKS — Card 1: Get started ===== -->
  <circle cx="60" cy="319" r="3.5" fill="#09A8B8"/>
  <text x="72" y="323" font-size="10" fill="#09A8B8">Get started with Azure workloads protection</text>
  <circle cx="60" cy="343" r="3.5" fill="#09A8B8"/>
  <text x="72" y="347" font-size="10" fill="#09A8B8">Azure protection implementation workflow</text>
  <circle cx="60" cy="367" r="3.5" fill="#09A8B8"/>
  <text x="72" y="371" font-size="10" fill="#09A8B8">Protecting your first Azure subscription</text>
  <circle cx="60" cy="391" r="3.5" fill="#09A8B8"/>
  <text x="72" y="395" font-size="10" fill="#09A8B8">Quick links for Azure workloads</text>

  <!-- ===== TOPIC LINKS — Card 2: Set up and protect ===== -->
  <circle cx="440" cy="319" r="3.5" fill="#09A8B8"/>
  <text x="452" y="323" font-size="10" fill="#09A8B8">Set up Azure cloud accounts</text>
  <circle cx="440" cy="343" r="3.5" fill="#09A8B8"/>
  <text x="452" y="347" font-size="10" fill="#09A8B8">Set up Exocompute on Azure</text>
  <circle cx="440" cy="367" r="3.5" fill="#09A8B8"/>
  <text x="452" y="371" font-size="10" fill="#09A8B8">Set up Azure storage tiering</text>
  <circle cx="440" cy="391" r="3.5" fill="#09A8B8"/>
  <text x="452" y="395" font-size="10" fill="#09A8B8">Set up Azure workloads protection</text>

  <!-- ===== TOPIC LINKS — Card 3: Manage and recover ===== -->
  <circle cx="820" cy="319" r="3.5" fill="#09A8B8"/>
  <text x="832" y="323" font-size="10" fill="#09A8B8">Manage Azure virtual machines</text>
  <circle cx="820" cy="343" r="3.5" fill="#09A8B8"/>
  <text x="832" y="347" font-size="10" fill="#09A8B8">Manage Azure Blob Storage</text>
  <circle cx="820" cy="367" r="3.5" fill="#09A8B8"/>
  <text x="832" y="371" font-size="10" fill="#09A8B8">Manage Azure SQL Database</text>
  <circle cx="820" cy="391" r="3.5" fill="#09A8B8"/>
  <text x="832" y="395" font-size="10" fill="#09A8B8">Recover Azure workloads</text>

  <!-- Footer -->
  <rect x="0" y="478" width="1200" height="22" fill="#0A2347" rx="0"/>
  <rect x="0" y="488" width="1200" height="12" fill="#0A2347" rx="12"/>
  <text x="600" y="492" font-size="9" fill="#4A7A9A" text-anchor="middle">Rubrik Security Cloud  |  Microsoft Azure Workloads  |  Protection Journey</text>

  <!-- Perimeter border (drawn last) -->
  <rect width="1200" height="500" fill="none" stroke="#09A8B8" stroke-width="5" rx="12"/>

</svg>
