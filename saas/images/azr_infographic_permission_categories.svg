<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720"
     font-family="Segoe UI, Calibri, Arial, sans-serif">

  <rect width="1000" height="720" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="64" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="48" width="1000" height="16" fill="#1B2A4A"/>
  <text x="500" y="27" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Azure Cloud Account: Permission Categories</text>
  <text x="500" y="51" text-anchor="middle" font-size="11" fill="#8BB8E8">Select permission categories that match your intended use cases. You can add more later as needs evolve.</text>

  <!-- ═══════════ LEFT PANEL — Cloud-Native Storage  x=14 w=468 ═══════════ -->
  <!-- Panel outer -->
  <rect x="14" y="76" width="468" height="632" fill="#FFFFFF" rx="8" stroke="#43A047" stroke-width="2"/>
  <!-- Header — h=64 so subtitle has room -->
  <rect x="14" y="76" width="468" height="64" fill="#43A047" rx="8"/>
  <rect x="14" y="116" width="468" height="24" fill="#43A047"/>
  <text x="248" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Use Case: Cloud-Native Storage</text>
  <text x="248" y="131" text-anchor="middle" font-size="11" fill="#C8E6C9">For archival locations and SQL immutable backup storage</text>

  <!-- Basic — center-aligned, y=152 -->
  <rect x="28" y="152" width="440" height="78" fill="#E8F5E9" rx="5" stroke="#43A047" stroke-width="1"/>
  <text x="248" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Basic</text>
  <text x="248" y="191" text-anchor="middle" font-size="10" fill="#333">Required for all cloud-native storage operations.</text>
  <text x="248" y="207" text-anchor="middle" font-size="10" fill="#333">Grants fundamental access to manage Azure storage accounts.</text>

  <!-- Encryption — y=242 -->
  <rect x="28" y="242" width="440" height="78" fill="#E8F5E9" rx="5" stroke="#43A047" stroke-width="1"/>
  <text x="248" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Encryption</text>
  <text x="248" y="281" text-anchor="middle" font-size="10" fill="#333">Required when creating archival locations with customer-managed</text>
  <text x="248" y="297" text-anchor="middle" font-size="10" fill="#333">encryption keys (custom storage encryption toggle enabled).</text>

  <!-- SQL Archival — y=332 -->
  <rect x="28" y="332" width="440" height="78" fill="#E8F5E9" rx="5" stroke="#43A047" stroke-width="1"/>
  <text x="248" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">SQL Archival</text>
  <text x="248" y="371" text-anchor="middle" font-size="10" fill="#333">Required for storing immutable backups for Azure SQL Database</text>
  <text x="248" y="387" text-anchor="middle" font-size="10" fill="#333">and Azure SQL Managed Instance Rubrik backups.</text>

  <!-- Divider + summary -->
  <line x1="28" y1="424" x2="452" y2="424" stroke="#C8E6C9" stroke-width="1"/>
  <text x="248" y="448" text-anchor="middle" font-size="11" fill="#555">Select these categories when adding an Azure archival location</text>
  <text x="248" y="466" text-anchor="middle" font-size="11" fill="#555">for storage tiering or SQL immutable backup targets.</text>

  <!-- ═══════════ RIGHT PANEL — Protection  x=498 w=488 ═══════════ -->
  <rect x="498" y="76" width="488" height="632" fill="#FFFFFF" rx="8" stroke="#0076CE" stroke-width="2"/>
  <!-- Header -->
  <rect x="498" y="76" width="488" height="64" fill="#0076CE" rx="8"/>
  <rect x="498" y="116" width="488" height="24" fill="#0076CE"/>
  <text x="742" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Use Case: Protection</text>
  <text x="742" y="131" text-anchor="middle" font-size="11" fill="#BAD9F5">For workload backup, recovery, and discovery operations</text>

  <!-- Column sub-headers — Feature cell x=512 w=200  |  Category cell x=714 w=258 -->
  <rect x="512" y="152" width="460" height="26" fill="#E8F4FF" rx="3"/>
  <text x="612" y="169" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B2A4A">Feature / Workload</text>
  <text x="843" y="169" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B2A4A">Permission Categories Required</text>
  <line x1="714" y1="152" x2="714" y2="178" stroke="#CBD5E0" stroke-width="1"/>

  <!-- ── Row 1: Discover Cloud Objects  h=50 y=180 ── -->
  <rect x="512" y="180" width="200" height="50" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <text x="612" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Discover Cloud Objects</text>
  <text x="612" y="217" text-anchor="middle" font-size="9" fill="#666">All workload types</text>
  <rect x="714" y="180" width="258" height="50" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="722" y="192" width="56" height="20" fill="#0076CE" rx="3"/>
  <text x="750" y="206" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Basic</text>

  <!-- ── Row 2: Azure VMs and Managed Disks  h=132 y=232 ── -->
  <rect x="512" y="232" width="200" height="132" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <text x="612" y="284" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Azure VMs and</text>
  <text x="612" y="299" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Managed Disks</text>
  <text x="612" y="318" text-anchor="middle" font-size="9" fill="#666">Backup, export, restore,</text>
  <text x="612" y="332" text-anchor="middle" font-size="9" fill="#666">mount, file recovery,</text>
  <text x="612" y="346" text-anchor="middle" font-size="9" fill="#666">private snapshot access</text>
  <rect x="714" y="232" width="258" height="132" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Badge line 1: Basic + Export and Restore -->
  <rect x="722" y="242" width="56" height="20" fill="#0076CE" rx="3"/>
  <text x="750" y="256" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Basic</text>
  <rect x="784" y="242" width="150" height="20" fill="#1E88E5" rx="3"/>
  <text x="859" y="256" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Export and Restore</text>
  <!-- Badge line 2: Export and Restore Power Off VM -->
  <rect x="722" y="268" width="230" height="20" fill="#1E88E5" rx="3"/>
  <text x="837" y="282" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Export and Restore Power Off VM</text>
  <!-- Badge line 3: File-level recovery — two-line badge, product restriction inside -->
  <rect x="722" y="294" width="192" height="32" fill="#42A5F5" rx="3"/>
  <text x="818" y="307" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">File-level recovery</text>
  <text x="818" y="320" text-anchor="middle" font-size="8" fill="#E3F2FD">RSC and RSCG only</text>
  <!-- Badge line 4: Private access to snapshots -->
  <rect x="722" y="332" width="192" height="20" fill="#42A5F5" rx="3"/>
  <text x="818" y="346" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Private access to snapshots</text>

  <!-- ── Row 3: Azure SQL Database  h=80 y=366 ── -->
  <rect x="512" y="366" width="200" height="80" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <text x="612" y="396" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Azure SQL Database</text>
  <text x="612" y="413" text-anchor="middle" font-size="9" fill="#666">Backup, recovery,</text>
  <text x="612" y="427" text-anchor="middle" font-size="9" fill="#666">immutable backups (RSC, RSCG)</text>
  <rect x="714" y="366" width="258" height="80" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="722" y="376" width="56" height="20" fill="#0076CE" rx="3"/>
  <text x="750" y="390" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Basic</text>
  <rect x="784" y="376" width="76" height="20" fill="#1E88E5" rx="3"/>
  <text x="822" y="390" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Recovery</text>
  <rect x="722" y="402" width="140" height="20" fill="#1E88E5" rx="3"/>
  <text x="792" y="416" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Immutable Backups</text>

  <!-- ── Row 4: Azure SQL MI  h=80 y=448 ── -->
  <rect x="512" y="448" width="200" height="80" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <text x="612" y="478" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Azure SQL Managed Instance</text>
  <text x="612" y="495" text-anchor="middle" font-size="9" fill="#666">Backup, recovery,</text>
  <text x="612" y="509" text-anchor="middle" font-size="9" fill="#666">immutable backups (RSC, RSCG)</text>
  <rect x="714" y="448" width="258" height="80" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="722" y="458" width="56" height="20" fill="#0076CE" rx="3"/>
  <text x="750" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Basic</text>
  <rect x="784" y="458" width="76" height="20" fill="#1E88E5" rx="3"/>
  <text x="822" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Recovery</text>
  <rect x="722" y="484" width="140" height="20" fill="#1E88E5" rx="3"/>
  <text x="792" y="498" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Immutable Backups</text>

  <!-- ── Row 5: Azure Blob Storage  h=60 y=530 ── -->
  <rect x="512" y="530" width="200" height="60" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <text x="612" y="554" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Azure Blob Storage</text>
  <text x="612" y="571" text-anchor="middle" font-size="9" fill="#666">Backup and recovery (RSC, RSCP)</text>
  <rect x="714" y="530" width="258" height="60" fill="#F8FAFB" rx="2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="722" y="542" width="56" height="20" fill="#0076CE" rx="3"/>
  <text x="750" y="556" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Basic</text>
  <rect x="784" y="542" width="76" height="20" fill="#1E88E5" rx="3"/>
  <text x="822" y="556" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">Recovery</text>

  <!-- ── Row 6: Optimize Backup Management  h=62 y=592 ── -->
  <rect x="512" y="592" width="200" height="62" fill="#FFF3E0" rx="2" stroke="#FF8F00" stroke-width="1"/>
  <text x="612" y="616" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Optimize Backup</text>
  <text x="612" y="632" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Management</text>
  <rect x="714" y="592" width="258" height="62" fill="#FFF3E0" rx="2" stroke="#FF8F00" stroke-width="1"/>
  <text x="843" y="613" text-anchor="middle" font-size="9" fill="#E65100">Data Classification Scanning</text>
  <text x="843" y="633" text-anchor="middle" font-size="9" fill="#E65100">Data Classification Metadata Scanning</text>

  <!-- Important note — inside right panel, spans both sub-cells -->
  <rect x="512" y="662" width="460" height="36" fill="#E3F2FD" rx="5" stroke="#1565C0" stroke-width="1.2"/>
  <text x="742" y="677" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Important: Discover Cloud Objects (Basic) is always required and cannot be removed.</text>
  <text x="742" y="692" text-anchor="middle" font-size="9" fill="#333">When you select Protection or Optimize Backup Management, Basic is automatically selected.</text>

  <!-- Footer -->
  <rect x="14" y="714" width="972" height="4" fill="#E8F4FF" rx="2"/>

</svg>
