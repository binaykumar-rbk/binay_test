<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 716" width="1040" height="716"
     font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="1040" height="716" fill="#F0F4F8"/>

  <!-- ═══ Title ═══ -->
  <rect x="0" y="0" width="1040" height="58" fill="#1B2A4A" rx="6"/>
  <rect x="0" y="42" width="1040" height="16" fill="#1B2A4A"/>
  <text x="520" y="24" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Exocompute on Azure: Network Setup Overview</text>
  <text x="520" y="48" text-anchor="middle" font-size="11" fill="#8BB8E8">Traffic path: AKS Workers → NSG → Load Balancer → Internet  ·  Configure items ①–⑦ before launching Exocompute</text>

  <!-- ══════════════════════════════════════════════════════════
       LEFT PANEL — Azure infrastructure
       x=14, y=66, w=572, h=358
  ══════════════════════════════════════════════════════════ -->

  <!-- Azure Subscription (dashed) -->
  <rect x="14" y="66" width="572" height="358" rx="8" fill="#FFFFFF"
        stroke="#0078D4" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="14" y="66" width="200" height="22" fill="#0078D4" rx="4"/>
  <text x="24" y="81" font-size="11" font-weight="bold" fill="#FFFFFF">Your Azure Subscription</text>

  <!-- Exocompute VNet -->
  <rect x="26" y="98" width="548" height="314" rx="6" fill="#E8F4FF"
        stroke="#1565C0" stroke-width="1.5"/>
  <text x="38" y="114" font-size="10" font-weight="bold" fill="#1565C0">Exocompute VNet</text>

  <!-- Subnet -->
  <rect x="38" y="122" width="394" height="278" rx="5" fill="#C9E6F8"
        stroke="#1E88E5" stroke-width="1.5"/>
  <text x="50" y="138" font-size="10" font-weight="bold" fill="#1565C0">Exocompute Subnet (/25 recommended)</text>

  <!-- ① NSG bar -->
  <rect x="50" y="146" width="370" height="48" rx="4" fill="#1565C0"/>
  <text x="235" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">① Network Security Group (NSG)</text>
  <text x="235" y="183" text-anchor="middle" font-size="10" fill="#BBDEFB">Outbound rules:  443/TCP  ·  9000/TCP  ·  53/UDP  ·  1433/TCP</text>

  <!-- AKS cluster box -->
  <rect x="50" y="204" width="370" height="148" rx="5" fill="#FFFFFF"
        stroke="#42A5F5" stroke-width="1.5"/>
  <text x="235" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#0076CE">AKS Cluster (Exocompute)</text>

  <!-- Master Node -->
  <rect x="62" y="230" width="166" height="64" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="145" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Master Node</text>
  <text x="145" y="264" text-anchor="middle" font-size="9" fill="#444">Orchestrates worker lifecycle</text>
  <text x="145" y="278" text-anchor="middle" font-size="9" fill="#666">No Rubrik logic runs here</text>
  <text x="145" y="290" text-anchor="middle" font-size="9" fill="#888">Managed by AKS</text>

  <!-- Worker Node Pool -->
  <rect x="242" y="230" width="166" height="64" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="325" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Worker Node Pool  ⑤</text>
  <text x="325" y="264" text-anchor="middle" font-size="9" fill="#444">1–64 nodes · 30 pods/node</text>
  <text x="325" y="278" text-anchor="middle" font-size="9" fill="#444">Auto-scales on demand</text>
  <text x="325" y="290" text-anchor="middle" font-size="9" fill="#666">Executes Rubrik operations</text>

  <!-- ⑥ Private AKS -->
  <rect x="62" y="304" width="346" height="38" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="235" y="319" text-anchor="middle" font-size="11" font-weight="bold" fill="#311B92">⑥ Private AKS Cluster</text>
  <text x="235" y="335" text-anchor="middle" font-size="9" fill="#666">API server accessible within VNet only  ·  Private DNS zone auto-created in node RG</text>

  <!-- ③ CNI Overlay -->
  <rect x="50" y="358" width="370" height="36" rx="4" fill="#FFFFFF" stroke="#F9A825" stroke-width="1.5"/>
  <text x="235" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">③ Azure CNI Overlay</text>
  <text x="235" y="388" text-anchor="middle" font-size="9" fill="#555">Pod CIDR /18+  ·  Pod IPs separate from subnet  ·  No subnet addresses consumed</text>

  <!-- ② Standard Load Balancer — right of subnet inside VNet -->
  <rect x="452" y="204" width="110" height="80" rx="6" fill="#FFFFFF"
        stroke="#1E88E5" stroke-width="2"/>
  <rect x="452" y="204" width="110" height="26" rx="6" fill="#1E88E5"/>
  <rect x="452" y="218" width="110" height="12" fill="#1E88E5"/>
  <text x="507" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">② Standard LB</text>
  <text x="507" y="244" text-anchor="middle" font-size="9" fill="#1565C0">Outbound public IP</text>
  <text x="507" y="258" text-anchor="middle" font-size="9" fill="#555">Manages all egress</text>
  <text x="507" y="272" text-anchor="middle" font-size="9" fill="#555">from AKS cluster</text>

  <!-- ④ Firewall — optional, below LB -->
  <rect x="452" y="296" width="110" height="68" rx="6" fill="#FFFFFF"
        stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="507" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">④ Firewall</text>
  <text x="507" y="330" text-anchor="middle" font-size="9" fill="#555">Optional</text>
  <text x="507" y="346" text-anchor="middle" font-size="9" fill="#555">Add network +</text>
  <text x="507" y="360" text-anchor="middle" font-size="9" fill="#555">app rules if present</text>

  <!-- Arrow: Subnet right (420) → LB left (452) at y=244 -->
  <line x1="420" y1="244" x2="448" y2="244" stroke="#0076CE" stroke-width="2.5"/>
  <polygon points="444,238 454,244 444,250" fill="#0076CE"/>

  <!-- Distribution trunk: LB right (562) → x=600 -->
  <line x1="562" y1="244" x2="596" y2="244" stroke="#374151" stroke-width="2"/>
  <!-- Vertical trunk at x=596: from first connection (y=152) to last connection (y=410) -->
  <line x1="596" y1="152" x2="596" y2="410" stroke="#374151" stroke-width="2"/>

  <!-- ══════════════════════════════════════════════════════════
       RIGHT PANEL — External Destinations
       x=606, y=66, w=420, h=374
  ══════════════════════════════════════════════════════════ -->
  <rect x="606" y="66" width="420" height="374" rx="8" fill="#FFFFFF"
        stroke="#CBD5E0" stroke-width="1.5"/>
  <rect x="606" y="66" width="420" height="30" rx="6" fill="#374151"/>
  <rect x="606" y="80" width="420" height="16" fill="#374151"/>
  <text x="816" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Outbound Traffic Destinations</text>

  <!-- Destination rows — y-centers: 152, 210, 268, 326, 392 -->

  <!-- ─ AzureCloud ─ -->
  <line x1="596" y1="152" x2="618" y2="152" stroke="#0078D4" stroke-width="2"/>
  <polygon points="614,146 626,152 614,158" fill="#0078D4"/>
  <rect x="626" y="114" width="386" height="76" rx="5" fill="#E3F2FD" stroke="#0078D4" stroke-width="1.5"/>
  <text x="638" y="132" font-size="10" font-weight="bold" fill="#0078D4">AzureCloud service tag</text>
  <text x="638" y="149" font-size="9" fill="#333">Port 443/TCP — container images (ACR) and Azure Storage uploads</text>
  <text x="638" y="164" font-size="9" fill="#333">Port 9000/TCP — worker-to-master node AKS tunnel</text>
  <text x="638" y="179" font-size="9" fill="#888">Tip: restrict port 9000 to AzureCloud.&lt;region&gt; service tag</text>

  <!-- ─ Google Cloud ─ -->
  <line x1="596" y1="218" x2="618" y2="218" stroke="#4285F4" stroke-width="2"/>
  <polygon points="614,212 626,218 614,224" fill="#4285F4"/>
  <rect x="626" y="198" width="386" height="50" rx="5" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="638" y="215" font-size="10" font-weight="bold" fill="#4285F4">Google Cloud public IPs  (or Internet service tag)</text>
  <text x="638" y="232" font-size="9" fill="#333">Port 443/TCP — snapshot index metadata uploaded to Google Cloud Storage</text>
  <text x="638" y="244" font-size="9" fill="#888">Obtain IP ranges from Google's published JSON feed</text>

  <!-- ─ Rubrik RSC ─ -->
  <line x1="596" y1="278" x2="618" y2="278" stroke="#0076CE" stroke-width="2"/>
  <polygon points="614,272 626,278 614,284" fill="#0076CE"/>
  <rect x="626" y="258" width="386" height="50" rx="5" fill="#E8F4FF" stroke="#0076CE" stroke-width="1.5"/>
  <text x="638" y="275" font-size="10" font-weight="bold" fill="#0076CE">prod-*.prod.my.rubrik.com</text>
  <text x="638" y="292" font-size="9" fill="#333">Port 443/TCP — workers upload job logs and metrics to RSC</text>
  <text x="638" y="304" font-size="9" fill="#888">Required for RSC deployments</text>

  <!-- ─ Azure DNS ─ -->
  <line x1="596" y1="340" x2="618" y2="340" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="614,334 626,340 614,346" fill="#7B1FA2"/>
  <rect x="626" y="320" width="386" height="50" rx="5" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="638" y="337" font-size="10" font-weight="bold" fill="#7B1FA2">Azure platform DNS  —  168.63.129.16</text>
  <text x="638" y="354" font-size="9" fill="#333">Port 53/UDP — resolves master node FQDN</text>
  <text x="638" y="366" font-size="9" fill="#888">Required when Exocompute VNet uses a custom DNS server</text>

  <!-- ─ SQL VNet (conditional) ─ -->
  <line x1="596" y1="410" x2="618" y2="410" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="614,404 626,410 614,416" fill="#2E7D32"/>
  <rect x="626" y="390" width="386" height="34" rx="5" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="638" y="405" font-size="10" font-weight="bold" fill="#2E7D32">SQL workload VNet  (conditional)</text>
  <text x="638" y="419" font-size="9" fill="#333">Port 1433/TCP — required only when protecting Azure SQL DB or SQL MI</text>

  <!-- ══════════════════════════════════════════════════════════
       CONDITIONAL COMPONENTS STRIP  y=436
  ══════════════════════════════════════════════════════════ -->
  <rect x="14" y="436" width="1012" height="22" rx="4" fill="#E2E8F0"/>
  <text x="520" y="451" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Provision vCPU quotas before every launch · Configure Blob networking only when protecting Blob Storage</text>

  <!-- Blob NSG ⑦ -->
  <rect x="14" y="464" width="480" height="72" rx="6" fill="#FFFFFF"
        stroke="#43A047" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="26" y="482" font-size="11" font-weight="bold" fill="#2E7D32">⑦  Azure Blob NSG + Private Endpoints</text>
  <text x="26" y="498" font-size="9" fill="#555">Required when protecting Azure Blob Storage</text>
  <text x="26" y="513" font-size="9" fill="#555">Add additional NSG outbound rules for blob storage</text>
  <text x="26" y="528" font-size="9" fill="#555">FQDN endpoints on the Exocompute subnet</text>


  <!-- vCPU Quota ⑤ -->
  <rect x="514" y="464" width="512" height="72" rx="6" fill="#FFFFFF"
        stroke="#E53935" stroke-width="1.5"/>
  <text x="526" y="482" font-size="11" font-weight="bold" fill="#C62828">⑤  vCPU Quota — always provision before cluster launch</text>
  <text x="526" y="498" font-size="9" fill="#555">Standard_D series: always required · Standard_E (Blob), Standard_B (app-consistent VMs): workload-specific</text>
  <text x="526" y="513" font-size="9" fill="#555">Verify quota per VM series in each Azure region where you deploy Exocompute</text>
  <text x="526" y="528" font-size="9" fill="#555">Request quota increases in the Azure portal if needed before cluster launch</text>

  <!-- ══════════════════════════════════════════════════════════
       CONFIGURATION CHECKLIST  y=548
  ══════════════════════════════════════════════════════════ -->
  <rect x="14" y="548" width="1012" height="132" rx="6" fill="#FFFFFF"
        stroke="#CBD5E0" stroke-width="1"/>
  <text x="520" y="566" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Configuration Checklist — complete all that apply before adding your Exocompute configuration in RSC</text>

  <!-- Row 1 — items 1-4 at y≈588 -->
  <!-- Item 1 -->
  <circle cx="36" cy="590" r="12" fill="#1565C0"/>
  <text x="36" y="594" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="54" y="586" font-size="10" font-weight="bold" fill="#1B2A4A">NSG outbound rules</text>
  <text x="54" y="600" font-size="9" fill="#555">Ports: 443, 9000, 53/UDP, 1433...</text>

  <!-- Item 2 -->
  <circle cx="274" cy="590" r="12" fill="#1E88E5"/>
  <text x="274" y="594" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="292" y="586" font-size="10" font-weight="bold" fill="#1B2A4A">Standard load balancer</text>
  <text x="292" y="600" font-size="9" fill="#555">Policy exemption or UDR for public IP</text>

  <!-- Item 3 -->
  <circle cx="534" cy="590" r="12" fill="#E65100"/>
  <text x="534" y="594" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="552" y="586" font-size="10" font-weight="bold" fill="#1B2A4A">CNI overlay network rules</text>
  <text x="552" y="600" font-size="9" fill="#555">Pod CIDR /18+, no overlap with subnet</text>

  <!-- Item 4 -->
  <circle cx="794" cy="590" r="12" fill="#E65100"/>
  <text x="794" y="594" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="812" y="586" font-size="10" font-weight="bold" fill="#1B2A4A">Firewall rules  (if firewall present)</text>
  <text x="812" y="600" font-size="9" fill="#555">Network rule (9000) + app rule (443)...</text>

  <!-- Divider -->
  <line x1="26" y1="612" x2="1014" y2="612" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Row 2 — items 5-7 at y≈634 -->
  <!-- Item 5 -->
  <circle cx="36" cy="634" r="12" fill="#E53935"/>
  <text x="36" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="54" y="630" font-size="10" font-weight="bold" fill="#1B2A4A">vCPU quota</text>
  <text x="54" y="644" font-size="9" fill="#555">Standard_D: always; E/B: workload-specific</text>

  <!-- Item 6 -->
  <circle cx="274" cy="634" r="12" fill="#7E57C2"/>
  <text x="274" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="292" y="630" font-size="10" font-weight="bold" fill="#1B2A4A">Private AKS DNS zone</text>
  <text x="292" y="644" font-size="9" fill="#555">Auto-created; custom zone if needed</text>

  <!-- Item 7 -->
  <circle cx="534" cy="634" r="12" fill="#43A047"/>
  <text x="534" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">7</text>
  <text x="552" y="630" font-size="10" font-weight="bold" fill="#1B2A4A">Blob NSG + endpoints</text>
  <text x="552" y="644" font-size="9" fill="#555">Only if protecting Azure Blob Storage</text>

  <!-- DPI Warning -->
  <rect x="786" y="618" width="238" height="46" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="798" y="633" font-size="9" font-weight="bold" fill="#C62828">Important: Disable Deep Packet Inspection</text>
  <text x="798" y="647" font-size="9" fill="#555">(DPI) on the Exocompute VNet and subnet.</text>
  <text x="798" y="659" font-size="9" fill="#555">DPI causes Exocompute health check failures.</text>

  <!-- Disclaimer footnote -->
  <text x="520" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#6B7280">Note: This diagram shows key configurations only. For complete port lists and requirements, see the dedicated Exocompute network setup topics.</text>

</svg>
