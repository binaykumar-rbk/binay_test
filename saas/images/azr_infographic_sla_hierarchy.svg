<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="880" height="620" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="68" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="52" width="880" height="16" fill="#1B2A4A"/>
  <text x="440" y="29" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">SLA Domain Assignment Hierarchy for Azure Workloads</text>
  <text x="440" y="53" text-anchor="middle" font-size="11" fill="#8BB8E8">Lower levels override higher levels · Tags override all scope-based assignments · Direct workload assignment overrides all</text>

  <!-- ═══════════════ LEFT SIDE: Hierarchy pyramid ═══════════════ -->

  <!-- Level 1: Subscription (broadest) -->
  <rect x="170" y="88" width="350" height="66" fill="#1565C0" rx="8"/>
  <text x="345" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Azure Subscription</text>
  <text x="345" y="138" text-anchor="middle" font-size="11" fill="#BBDEFB">Broadest scope — protects all workloads in the subscription</text>

  <!-- Connector line 1 → 2 -->
  <line x1="345" y1="154" x2="345" y2="172" stroke="#1565C0" stroke-width="2"/>
  <polygon points="339,172 351,172 345,182" fill="#1565C0"/>

  <!-- Level 2: Resource Group -->
  <rect x="205" y="182" width="280" height="66" fill="#1976D2" rx="8"/>
  <text x="345" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Resource Group</text>
  <text x="345" y="230" text-anchor="middle" font-size="11" fill="#BBDEFB">Overrides subscription assignment for this group</text>

  <!-- Connector line 2 → 3 -->
  <line x1="345" y1="248" x2="345" y2="266" stroke="#1976D2" stroke-width="2"/>
  <polygon points="339,266 351,266 345,276" fill="#1976D2"/>

  <!-- Level 3: Azure Region -->
  <rect x="238" y="276" width="214" height="66" fill="#1E88E5" rx="8"/>
  <text x="345" y="301" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Azure Region</text>
  <text x="345" y="318" text-anchor="middle" font-size="11" fill="#E3F2FD">Overrides subscription and RG</text>
  <text x="345" y="333" text-anchor="middle" font-size="11" fill="#E3F2FD">assignments within the region</text>

  <!-- Connector line 3 → 4 -->
  <line x1="345" y1="342" x2="345" y2="360" stroke="#1E88E5" stroke-width="2"/>
  <polygon points="339,360 351,360 345,370" fill="#1E88E5"/>

  <!-- Level 4: Individual Workload (most specific) -->
  <rect x="259" y="370" width="172" height="66" fill="#42A5F5" rx="8"/>
  <text x="345" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Individual Workload</text>
  <text x="345" y="418" text-anchor="middle" font-size="11" fill="#E3F2FD">VM, Managed Disk, Blob, SQL</text>

  <!-- Override labels on right side of arrows -->
  <rect x="530" y="198" width="160" height="38" fill="#E3F2FD" rx="4" stroke="#1976D2" stroke-width="1"/>
  <text x="610" y="212" text-anchor="middle" font-size="10" fill="#1565C0">Resource Group (RG)</text>
  <text x="610" y="227" text-anchor="middle" font-size="10" fill="#1565C0">overrides Subscription</text>
  <line x1="485" y1="217" x2="530" y2="217" stroke="#1976D2" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="530" y="292" width="148" height="38" fill="#E3F2FD" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="604" y="307" text-anchor="middle" font-size="10" fill="#1565C0">Region overrides RG</text>
  <text x="604" y="321" text-anchor="middle" font-size="10" fill="#1565C0">and Subscription</text>
  <line x1="452" y1="311" x2="530" y2="311" stroke="#1E88E5" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="530" y="386" width="160" height="38" fill="#E3F2FD" rx="4" stroke="#42A5F5" stroke-width="1"/>
  <text x="610" y="400" text-anchor="middle" font-size="10" fill="#1565C0">Direct assignment overrides</text>
  <text x="610" y="414" text-anchor="middle" font-size="10" fill="#1565C0">tags and all scope levels</text>
  <line x1="431" y1="403" x2="530" y2="403" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══════════════ TAG OVERRIDE BAND ═══════════════ -->
  <!-- Side band for tag override -->
  <rect x="24" y="88" width="126" height="348" fill="#FF8F00" rx="8" opacity="0.92"/>
  <g transform="rotate(-90, 87, 262)">
    <text x="87" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">TAG-BASED OVERRIDE</text>
    <text x="87" y="271" text-anchor="middle" font-size="9" fill="#FFF8E1">Cuts across all scope levels</text>
  </g>
  <!-- Arrow pointing right across all levels -->
  <line x1="150" y1="120" x2="170" y2="120" stroke="#FF8F00" stroke-width="2.5"/>
  <polygon points="165,115 170,120 165,125" fill="#FF8F00"/>
  <line x1="150" y1="215" x2="205" y2="215" stroke="#FF8F00" stroke-width="2.5"/>
  <polygon points="200,210 205,215 200,220" fill="#FF8F00"/>
  <line x1="150" y1="309" x2="238" y2="309" stroke="#FF8F00" stroke-width="2.5"/>
  <polygon points="233,304 238,309 233,314" fill="#FF8F00"/>
  <line x1="150" y1="403" x2="259" y2="403" stroke="#FF8F00" stroke-width="2.5"/>
  <polygon points="254,398 259,403 254,408" fill="#FF8F00"/>

  <!-- ═══════════════ BOTTOM: How it works section ═══════════════ -->
  <rect x="24" y="458" width="832" height="148" fill="#FFFFFF" rx="8" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="440" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B2A4A">How SLA Domain inheritance and override works</text>

  <!-- Col 1 -->
  <rect x="36" y="492" width="250" height="100" fill="#EDF2F7" rx="6"/>
  <text x="161" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Subscription-level assignment</text>
  <text x="161" y="530" text-anchor="middle" font-size="10" fill="#333">Assign an SLA Domain to a subscription</text>
  <text x="161" y="545" text-anchor="middle" font-size="10" fill="#333">and ALL workloads in it are automatically</text>
  <text x="161" y="560" text-anchor="middle" font-size="10" fill="#333">protected — including newly provisioned</text>
  <text x="161" y="575" text-anchor="middle" font-size="10" fill="#333">resources. Best for broad protection.</text>

  <!-- Col 2 -->
  <rect x="302" y="492" width="250" height="100" fill="#EDF2F7" rx="6"/>
  <text x="427" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976D2">Override at lower levels</text>
  <text x="427" y="530" text-anchor="middle" font-size="10" fill="#333">Assign a different SLA Domain at resource</text>
  <text x="427" y="545" text-anchor="middle" font-size="10" fill="#333">group or individual workload level to apply</text>
  <text x="427" y="560" text-anchor="middle" font-size="10" fill="#333">a tighter or more custom policy for specific</text>
  <text x="427" y="575" text-anchor="middle" font-size="10" fill="#333">resources. The more specific level wins.</text>

  <!-- Col 3 -->
  <rect x="568" y="492" width="276" height="112" fill="#FFF3E0" rx="6" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="706" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Tag-based assignment (lateral override)</text>
  <text x="706" y="530" text-anchor="middle" font-size="10" fill="#333">Tag rules in RSC assign SLA Domains based on</text>
  <text x="706" y="545" text-anchor="middle" font-size="10" fill="#333">Azure tags, overriding all scope-based</text>
  <text x="706" y="560" text-anchor="middle" font-size="10" fill="#333">assignments (subscription, RG, and region).</text>
  <text x="706" y="575" text-anchor="middle" font-size="10" fill="#333">A direct workload assignment overrides</text>
  <text x="706" y="590" text-anchor="middle" font-size="10" fill="#333">both tags and all scope-based assignments.</text>

  <!-- Footer line -->
  <rect x="24" y="612" width="832" height="4" fill="#0076CE" rx="2"/>

</svg>
