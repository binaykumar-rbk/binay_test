<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="700" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="68" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="52" width="960" height="16" fill="#1B2A4A"/>
  <text x="480" y="29" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Azure Workloads: Recovery Options at a Glance</text>
  <text x="480" y="53" text-anchor="middle" font-size="12" fill="#8BB8E8">Choose the right recovery method based on your workload type and recovery scenario.</text>

  <!-- ═══════════════ COLUMN HEADERS ═══════════════ -->

  <!-- Workload / Scenario header -->
  <rect x="14" y="82" width="155" height="44" fill="#374151" rx="4"/>
  <text x="91" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Workload / Scenario</text>

  <!-- Col 2: Export / Create New VM or Disk
       CHANGED FROM: "Export / Create New VM"
       REASON: Row 3 (Managed Disk) also uses this column for disk export,
       not VM creation. The old header was misleading for non-VM rows. -->
  <rect x="174" y="82" width="118" height="44" fill="#0076CE" rx="4"/>
  <text x="233" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Export / Create</text>
  <text x="233" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">New VM or Disk</text>

  <!-- Col 3: Restore In-Place -->
  <rect x="297" y="82" width="118" height="44" fill="#0076CE" rx="4"/>
  <text x="356" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Restore</text>
  <text x="356" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">In-Place</text>

  <!-- Col 4: Virtual Disk Mount -->
  <rect x="420" y="82" width="118" height="44" fill="#0076CE" rx="4"/>
  <text x="479" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Virtual Disk</text>
  <text x="479" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Mount</text>

  <!-- Col 5: File / Folder Download -->
  <rect x="543" y="82" width="118" height="44" fill="#0076CE" rx="4"/>
  <text x="602" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">File / Folder</text>
  <text x="602" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Download</text>

  <!-- Col 6: In-Place File Recovery -->
  <rect x="666" y="82" width="118" height="44" fill="#0076CE" rx="4"/>
  <text x="725" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">In-Place File</text>
  <text x="725" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Recovery</text>

  <!-- Col 7: Workload-Specific Recovery
       CHANGED FROM: "Blob / SQL / Specialized Recovery"
       REASON: The old header was verbose and mixed content type (Blob/SQL)
       with category (Specialized). "Workload-Specific Recovery" clearly signals
       that this column covers recovery methods unique to each workload type. -->
  <rect x="789" y="82" width="158" height="44" fill="#0076CE" rx="4"/>
  <text x="868" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Workload-Specific</text>
  <text x="868" y="117" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Recovery</text>

  <!-- ═══════════════ ROW 1: Azure Virtual Machine — Full VM recovery ═══════════════ -->
  <rect x="14" y="132" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Azure Virtual Machine</text>
  <text x="91" y="165" text-anchor="middle" font-size="10" fill="#444">Full VM recovery</text>
  <text x="91" y="178" text-anchor="middle" font-size="10" fill="#666">(new location or restore)</text>

  <!-- Row 1, Col 2: Export — cross-region (**) + permission (†) apply -->
  <rect x="174" y="132" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="154" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="233" y="170" text-anchor="middle" font-size="9" fill="#2E7D32">New VM, any region</text>
  <text x="233" y="181" text-anchor="middle" font-size="9" fill="#F57F17">* †</text>

  <!-- Row 1, Col 3: Restore In-Place — permission (†) applies -->
  <rect x="297" y="132" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="154" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="356" y="170" text-anchor="middle" font-size="9" fill="#2E7D32">Keeps resourceId &amp; IP</text>
  <text x="356" y="181" text-anchor="middle" font-size="9" fill="#F57F17">†</text>

  <!-- Row 1, Cols 4-7: Not applicable — REMOVED "Not applicable" text;
       legend already defines — as "Not applicable for this workload" -->
  <rect x="420" y="132" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="162" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="543" y="132" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="162" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="666" y="132" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="162" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="789" y="132" width="158" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="162" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <!-- ═══════════════ ROW 2: Azure VM / Managed Disk — File or folder-level recovery ═══════════════ -->
  <!-- Row label: CHANGED "Azure VM / MD" → "Azure VM / Managed Disk"
       REASON: "MD" is an unexplained abbreviation on first use. -->
  <rect x="14" y="190" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B2A4A">Azure VM /</text>
  <text x="91" y="221" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B2A4A">Managed Disk</text>
  <text x="91" y="235" text-anchor="middle" font-size="9" fill="#444">File/folder recovery</text>

  <rect x="174" y="190" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="220" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="297" y="190" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="220" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="420" y="190" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="210" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="479" y="228" text-anchor="middle" font-size="9" fill="#2E7D32">Attach disk to a VM</text>
  <text x="479" y="239" text-anchor="middle" font-size="9" fill="#2E7D32">for manual recovery</text>

  <rect x="543" y="190" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="210" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="602" y="228" text-anchor="middle" font-size="9" fill="#2E7D32">Download to Azure</text>
  <text x="602" y="239" text-anchor="middle" font-size="9" fill="#F57F17">File indexing required</text>

  <rect x="666" y="190" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="210" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="725" y="228" text-anchor="middle" font-size="9" fill="#2E7D32">Recover to VM</text>
  <text x="725" y="239" text-anchor="middle" font-size="9" fill="#F57F17">File indexing required</text>

  <rect x="789" y="190" width="158" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="220" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <!-- ═══════════════ ROW 3: Managed Disk — Disk export or cross-region recovery ═══════════════ -->
  <rect x="14" y="248" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Managed Disk</text>
  <text x="91" y="278" text-anchor="middle" font-size="10" fill="#444">Disk export or</text>
  <text x="91" y="291" text-anchor="middle" font-size="10" fill="#666">cross-region recovery</text>

  <!-- Row 3, Col 2: Export — cross-region (**) + permission (†) apply -->
  <rect x="174" y="248" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="264" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="233" y="280" text-anchor="middle" font-size="9" fill="#2E7D32">Export to new disk,</text>
  <text x="233" y="291" text-anchor="middle" font-size="9" fill="#2E7D32">any region</text>
  <text x="233" y="296" text-anchor="middle" font-size="9" fill="#F57F17">* †</text>

  <rect x="297" y="248" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="278" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="420" y="248" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="268" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="479" y="285" text-anchor="middle" font-size="9" fill="#2E7D32">Mount to source</text>
  <text x="479" y="298" text-anchor="middle" font-size="9" fill="#2E7D32">or different VM</text>

  <rect x="543" y="248" width="118" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="268" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="602" y="284" text-anchor="middle" font-size="9" fill="#2E7D32">Download specific</text>
  <text x="602" y="298" text-anchor="middle" font-size="9" fill="#2E7D32">files from disk</text>

  <rect x="666" y="248" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="278" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="789" y="248" width="158" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="278" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <!-- ═══════════════ ROW 4: Azure Blob Storage ═══════════════ -->
  <rect x="14" y="306" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="326" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Azure Blob Storage</text>
  <text x="91" y="342" text-anchor="middle" font-size="10" fill="#444">Individual blob or</text>
  <text x="91" y="356" text-anchor="middle" font-size="10" fill="#666">full account recovery</text>

  <rect x="174" y="306" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="336" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="297" y="306" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="336" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="420" y="306" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="336" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="543" y="306" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="336" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="666" y="306" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="336" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="789" y="306" width="158" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="322" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="868" y="340" text-anchor="middle" font-size="9" fill="#2E7D32">Blob restore (individual)</text>
  <text x="868" y="353" text-anchor="middle" font-size="9" fill="#2E7D32">or full account restore</text>

  <!-- ═══════════════ ROW 5: Azure SQL Database ═══════════════ -->
  <rect x="14" y="364" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="384" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Azure SQL Database</text>
  <text x="91" y="400" text-anchor="middle" font-size="10" fill="#444">Database recovery</text>
  <text x="91" y="414" text-anchor="middle" font-size="10" fill="#666">or point-in-time</text>

  <rect x="174" y="364" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="394" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="297" y="364" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="394" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="420" y="364" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="394" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="543" y="364" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="394" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="666" y="364" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="394" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="789" y="364" width="158" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="381" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="868" y="399" text-anchor="middle" font-size="9" fill="#2E7D32">Recover to DB, PiT restore</text>
  <text x="868" y="412" text-anchor="middle" font-size="9" fill="#2E7D32">or export LTR backup</text>

  <!-- ═══════════════ ROW 6: Azure SQL Managed Instance ═══════════════ -->
  <rect x="14" y="422" width="155" height="52" fill="#EDF2F7" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="91" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B2A4A">Azure SQL MI</text>
  <text x="91" y="456" text-anchor="middle" font-size="10" fill="#444">Managed Instance</text>
  <text x="91" y="470" text-anchor="middle" font-size="10" fill="#666">recovery</text>

  <rect x="174" y="422" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="233" y="452" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="297" y="422" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="356" y="452" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="420" y="422" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="479" y="452" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="543" y="422" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="602" y="452" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="666" y="422" width="118" height="52" fill="#FFEBEE" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="725" y="452" text-anchor="middle" font-size="20" fill="#C62828">&#x2014;</text>

  <rect x="789" y="422" width="158" height="52" fill="#E8F5E9" rx="3" stroke="#CBD5E0" stroke-width="1"/>
  <text x="868" y="440" text-anchor="middle" font-size="20" fill="#2E7D32">&#x2713;</text>
  <text x="868" y="457" text-anchor="middle" font-size="9" fill="#2E7D32">Recover to DB, PiT restore</text>
  <text x="868" y="470" text-anchor="middle" font-size="9" fill="#2E7D32">or download BACPAC</text>

  <!-- ═══════════════ Legend and Notes ═══════════════ -->
  <rect x="14" y="490" width="930" height="112" fill="#FFFFFF" rx="6" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Symbol legend row -->
  <text x="30" y="509" font-size="12" font-weight="bold" fill="#1B2A4A">Legend:</text>

  <rect x="100" y="495" width="20" height="18" fill="#E8F5E9" rx="3"/>
  <text x="110" y="509" text-anchor="middle" font-size="13" fill="#2E7D32">&#x2713;</text>
  <text x="128" y="509" font-size="11" fill="#1B2A4A">Available recovery option</text>

  <rect x="310" y="495" width="20" height="18" fill="#FFEBEE" rx="3"/>
  <text x="320" y="509" text-anchor="middle" font-size="13" fill="#C62828">&#x2014;</text>
  <text x="338" y="509" font-size="11" fill="#1B2A4A">Not applicable for this workload</text>

  <!-- Footnotes -->
  <text x="30" y="535" font-size="11" fill="#F57F17">*</text>
  <text x="47" y="535" font-size="11" fill="#555">Cross-region recovery: VM Export and Managed Disk Export support recovery to any Azure region using snapshot replicas.</text>

  <text x="30" y="558" font-size="11" fill="#F57F17">†</text>
  <text x="52" y="558" font-size="11" fill="#555">Permission required: Export and In-Place Restore operations require the Export and Restore permission category on the target subscription.</text>

  <!-- Bottom bar -->
  <rect x="14" y="612" width="930" height="6" fill="#0076CE" rx="3"/>

</svg>
