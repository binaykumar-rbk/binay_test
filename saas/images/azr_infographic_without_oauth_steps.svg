<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 390" width="1000" height="390"
     font-family="Segoe UI, Calibri, Arial, sans-serif">

  <rect width="1000" height="390" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="60" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="44" width="1000" height="16" fill="#1B2A4A"/>
  <text x="500" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">Azure Cloud Account Setup: Without OAuth — Step Flow</text>
  <text x="500" y="47" text-anchor="middle" font-size="11" fill="#8BB8E8">Complete all 7 steps in order. Steps 4 and 6 are conditional — complete them only when applicable to your setup.</text>

  <!-- System label sections
       Steps 1-5: x=41 to x=577+114=691  center x=366
       Step 6:    x=711 to x=825          center x=768
       Step 7:    x=845 to x=959          center x=902 -->
  <rect x="41" y="68" width="650" height="22" fill="#E3F2FD" rx="4" stroke="#1565C0" stroke-width="1"/>
  <text x="366" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">In Microsoft Entra admin center</text>
  <rect x="711" y="68" width="114" height="22" fill="#FFF3E0" rx="4" stroke="#E65100" stroke-width="1"/>
  <text x="768" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Azure portal</text>
  <rect x="845" y="68" width="114" height="22" fill="#E8F4FF" rx="4" stroke="#0076CE" stroke-width="1"/>
  <text x="902" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">In RSC</text>

  <!-- Arrows between boxes (drawn first, boxes render on top)
       Box right edges: 155,289,423,557,691,825,959
       Next box left:   175,309,443,577,711,845 -->
  <line x1="155" y1="162" x2="168" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="162,157 175,162 162,167" fill="#374151"/>
  <line x1="289" y1="162" x2="302" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="296,157 309,162 296,167" fill="#374151"/>
  <line x1="423" y1="162" x2="436" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="430,157 443,162 430,167" fill="#374151"/>
  <line x1="557" y1="162" x2="570" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="564,157 577,162 564,167" fill="#374151"/>
  <line x1="691" y1="162" x2="704" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="698,157 711,162 698,167" fill="#374151"/>
  <line x1="825" y1="162" x2="838" y2="162" stroke="#374151" stroke-width="2"/>
  <polygon points="832,157 845,162 832,167" fill="#374151"/>

  <!-- ═══ STEP 1 — Create Entra app — ALWAYS REQUIRED ═══ -->
  <rect x="41" y="98" width="114" height="128" fill="#FFFFFF" rx="6" stroke="#0076CE" stroke-width="2"/>
  <rect x="41" y="98" width="114" height="28" fill="#0076CE" rx="6"/>
  <rect x="41" y="112" width="114" height="14" fill="#0076CE"/>
  <circle cx="98" cy="112" r="10" fill="#FFFFFF"/>
  <text x="98" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">1</text>
  <text x="98" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Create Entra app</text>
  <text x="98" y="194" text-anchor="middle" font-size="8" fill="#2E7D32">&#x25A0; Always required</text>

  <!-- ═══ STEP 2 — Add API permissions — ALWAYS REQUIRED ═══ -->
  <rect x="175" y="98" width="114" height="128" fill="#FFFFFF" rx="6" stroke="#0076CE" stroke-width="2"/>
  <rect x="175" y="98" width="114" height="28" fill="#0076CE" rx="6"/>
  <rect x="175" y="112" width="114" height="14" fill="#0076CE"/>
  <circle cx="232" cy="112" r="10" fill="#FFFFFF"/>
  <text x="232" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">2</text>
  <text x="232" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Add API permissions</text>
  <text x="232" y="194" text-anchor="middle" font-size="8" fill="#2E7D32">&#x25A0; Always required</text>

  <!-- ═══ STEP 3 — Add client secret — ALWAYS REQUIRED ═══ -->
  <rect x="309" y="98" width="114" height="128" fill="#FFFFFF" rx="6" stroke="#0076CE" stroke-width="2"/>
  <rect x="309" y="98" width="114" height="28" fill="#0076CE" rx="6"/>
  <rect x="309" y="112" width="114" height="14" fill="#0076CE"/>
  <circle cx="366" cy="112" r="10" fill="#FFFFFF"/>
  <text x="366" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">3</text>
  <text x="366" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Add client secret</text>
  <text x="366" y="194" text-anchor="middle" font-size="8" fill="#2E7D32">&#x25A0; Always required</text>

  <!-- ═══ STEP 4 — Create Entra group — CONDITIONAL (dashed, orange) ═══ -->
  <rect x="443" y="98" width="114" height="128" fill="#FFFDE7" rx="6" stroke="#F57F17" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="443" y="98" width="114" height="28" fill="#F57F17" rx="6"/>
  <rect x="443" y="112" width="114" height="14" fill="#F57F17"/>
  <circle cx="500" cy="112" r="10" fill="#FFFFFF"/>
  <text x="500" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">4</text>
  <text x="500" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Create Entra group</text>
  <text x="500" y="168" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">Conditional</text>
  <text x="500" y="181" text-anchor="middle" font-size="7" fill="#555">Exocompute + Entra ID</text>
  <text x="500" y="193" text-anchor="middle" font-size="7" fill="#555">auth — RSC only</text>
  <text x="500" y="214" text-anchor="middle" font-size="8" fill="#E65100">&#x25C6; If applicable</text>

  <!-- ═══ STEP 5 — Configure service principal — ALWAYS REQUIRED ═══ -->
  <rect x="577" y="98" width="114" height="128" fill="#FFFFFF" rx="6" stroke="#0076CE" stroke-width="2"/>
  <rect x="577" y="98" width="114" height="28" fill="#0076CE" rx="6"/>
  <rect x="577" y="112" width="114" height="14" fill="#0076CE"/>
  <circle cx="634" cy="112" r="10" fill="#FFFFFF"/>
  <text x="634" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">5</text>
  <text x="634" y="149" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Configure service</text>
  <text x="634" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">principal</text>
  <text x="634" y="194" text-anchor="middle" font-size="8" fill="#2E7D32">&#x25A0; Always required</text>

  <!-- ═══ STEP 6 — Create managed identity — CONDITIONAL (dashed, orange) ═══ -->
  <rect x="711" y="98" width="114" height="128" fill="#FFFDE7" rx="6" stroke="#F57F17" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="711" y="98" width="114" height="28" fill="#F57F17" rx="6"/>
  <rect x="711" y="112" width="114" height="14" fill="#F57F17"/>
  <circle cx="768" cy="112" r="10" fill="#FFFFFF"/>
  <text x="768" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">6</text>
  <text x="768" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Create managed</text>
  <text x="768" y="164" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">identity</text>
  <text x="768" y="180" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">Conditional</text>
  <text x="768" y="193" text-anchor="middle" font-size="7" fill="#555">Storage use case</text>
  <text x="768" y="205" text-anchor="middle" font-size="7" fill="#555">only</text>
  <text x="768" y="218" text-anchor="middle" font-size="8" fill="#E65100">&#x25C6; If applicable</text>

  <!-- ═══ STEP 7 — Add account in RSC — ALWAYS REQUIRED ═══ -->
  <rect x="845" y="98" width="114" height="128" fill="#FFFFFF" rx="6" stroke="#0076CE" stroke-width="2"/>
  <rect x="845" y="98" width="114" height="28" fill="#0076CE" rx="6"/>
  <rect x="845" y="112" width="114" height="14" fill="#0076CE"/>
  <circle cx="902" cy="112" r="10" fill="#FFFFFF"/>
  <text x="902" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#0076CE">7</text>
  <text x="902" y="149" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">Add account</text>
  <text x="902" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">in RSC</text>
  <text x="902" y="194" text-anchor="middle" font-size="8" fill="#2E7D32">&#x25A0; Always required</text>

  <!-- vs. OAuth comparison strip -->
  <rect x="41" y="240" width="918" height="72" fill="#FFFFFF" rx="6" stroke="#CBD5E0" stroke-width="1.5"/>
  <rect x="41" y="240" width="4" height="72" fill="#0076CE" rx="2"/>
  <text x="57" y="258" font-size="10" font-weight="bold" fill="#1B2A4A">vs. Configure with OAuth</text>
  <line x1="57" y1="264" x2="950" y2="264" stroke="#E2E8F0" stroke-width="1"/>
  <text x="57" y="278" font-size="10" fill="#555">Configure with OAuth: RSC completes steps 1–6 automatically. You only perform step 7 in RSC.</text>
  <text x="57" y="293" font-size="10" fill="#555">Configure without OAuth: You perform all 7 steps manually. Use when Azure Global Admin is unavailable or policy prevents automated app registration.</text>
  <text x="57" y="307" font-size="10" fill="#0076CE">For a full comparison, see: Manual versus OAuth configuration for Azure cloud account.</text>

  <!-- Legend -->
  <rect x="41" y="324" width="918" height="32" fill="#F8FAFB" rx="4" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="56" y="335" width="12" height="12" fill="#0076CE" rx="2"/>
  <text x="74" y="345" font-size="9" fill="#333">Always required</text>
  <rect x="186" y="335" width="12" height="12" fill="#F57F17" rx="2"/>
  <text x="204" y="345" font-size="9" fill="#333">Conditional</text>
  <rect x="292" y="335" width="12" height="12" fill="#FFFDE7" rx="2" stroke="#F57F17" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="310" y="345" font-size="9" fill="#555">Dashed border = conditional step</text>
  <text x="570" y="345" font-size="9" fill="#555">Step 4: Exocompute + Entra ID auth (RSC only) &#x2022; Step 6: Storage use case only</text>

</svg>
