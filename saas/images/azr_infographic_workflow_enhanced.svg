<svg xmlns="http://www.w3.org/2000/svg" width="840" height="1020" viewBox="0 0 840 1020" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="840" height="1020" fill="#0A2347" rx="12"/>
  <!-- Perimeter border -->
  <rect width="840" height="1020" fill="none" stroke="#09A8B8" stroke-width="3.5" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="840" height="72" fill="#060F1E" rx="12"/>
  <rect x="0" y="60" width="840" height="12" fill="#060F1E"/>
  <rect x="0" y="69" width="840" height="3" fill="#09A8B8"/>

  <!-- Title -->
  <text x="420" y="30" text-anchor="middle" fill="#FFFFFF" font-size="19" font-weight="bold" letter-spacing="0.3">Azure Protection Implementation Workflow</text>
  <text x="420" y="50" text-anchor="middle" fill="#8AACCC" font-size="11">End-to-end workflow: from planning to ongoing recovery operations</text>
  <text x="420" y="65" text-anchor="middle" fill="#09A8B8" font-size="10">6 phases  |  Rubrik Security Cloud</text>

  <!-- Vertical connector line through all phases -->
  <line x1="60" y1="108" x2="60" y2="944" stroke="#1A4A7A" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 1: Plan -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="118" r="20" fill="#0A2347" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="124" text-anchor="middle" fill="#09A8B8" font-size="15" font-weight="bold">1</text>

  <rect x="92" y="88" width="720" height="122" fill="#0D2E5A" rx="7" stroke="#09A8B8" stroke-width="1.5"/>
  <rect x="92" y="88" width="720" height="34" fill="#075F68" rx="7"/>
  <rect x="92" y="110" width="720" height="12" fill="#075F68"/>
  <text x="112" y="110" fill="#FFFFFF" font-size="13" font-weight="bold">Plan</text>
  <text x="590" y="110" text-anchor="end" fill="#B8F0F4" font-size="10">Identify scope  |  Assess prerequisites  |  Review design</text>

  <text x="120" y="142" fill="#B8F0F4" font-size="10" font-weight="bold">SCOPE</text>
  <text x="120" y="157" fill="#FFFFFF" font-size="10">&#x25B8; Identify Azure subscriptions</text>
  <text x="120" y="171" fill="#FFFFFF" font-size="10">&#x25B8; Enumerate workload types</text>
  <text x="120" y="185" fill="#8AACCC" font-size="10">  (VMs, SQL, AKS, Managed Disks)</text>

  <text x="348" y="142" fill="#B8F0F4" font-size="10" font-weight="bold">PREREQUISITES</text>
  <text x="348" y="157" fill="#FFFFFF" font-size="10">&#x25B8; Azure Contributor + custom roles</text>
  <text x="348" y="171" fill="#FFFFFF" font-size="10">&#x25B8; RSC tenant access and licenses</text>
  <text x="348" y="185" fill="#8AACCC" font-size="10">  (RSC account + Azure feature enabled)</text>

  <text x="576" y="142" fill="#B8F0F4" font-size="10" font-weight="bold">DESIGN</text>
  <text x="576" y="157" fill="#FFFFFF" font-size="10">&#x25B8; Select Exocompute regions</text>
  <text x="576" y="171" fill="#FFFFFF" font-size="10">&#x25B8; Estimate storage volumes</text>
  <text x="576" y="185" fill="#8AACCC" font-size="10">  (hot/cool/archive tier sizing)</text>

  <!-- Arrow 1 to 2 -->
  <polygon points="53,228 60,244 67,228" fill="#4DD2D2"/>
  <line x1="60" y1="210" x2="60" y2="244" stroke="#4DD2D2" stroke-width="2"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 2: Set Up Azure Accounts -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="256" r="20" fill="#0A2347" stroke="#09A8B8" stroke-width="2"/>
  <text x="60" y="262" text-anchor="middle" fill="#09A8B8" font-size="15" font-weight="bold">2</text>

  <rect x="92" y="226" width="720" height="122" fill="#0D2E5A" rx="7" stroke="#1A4A7A" stroke-width="1"/>
  <rect x="92" y="226" width="720" height="34" fill="#0C3460" rx="7"/>
  <rect x="92" y="248" width="720" height="12" fill="#0C3460"/>
  <text x="112" y="248" fill="#FFFFFF" font-size="13" font-weight="bold">Set Up Azure Accounts</text>
  <text x="590" y="248" text-anchor="end" fill="#B8D4E8" font-size="10">Register app  |  Grant permissions  |  Add subscription</text>

  <text x="120" y="280" fill="#B8D4E8" font-size="10" font-weight="bold">APP REGISTRATION</text>
  <text x="120" y="295" fill="#FFFFFF" font-size="10">&#x25B8; Create Azure app in Entra ID</text>
  <text x="120" y="309" fill="#FFFFFF" font-size="10">&#x25B8; Capture tenant ID and client ID</text>
  <text x="120" y="323" fill="#8AACCC" font-size="10">  (provided to RSC during setup)</text>

  <text x="348" y="280" fill="#B8D4E8" font-size="10" font-weight="bold">PERMISSIONS</text>
  <text x="348" y="295" fill="#FFFFFF" font-size="10">&#x25B8; Assign Contributor role</text>
  <text x="348" y="309" fill="#FFFFFF" font-size="10">&#x25B8; Add custom RSC roles for</text>
  <text x="348" y="323" fill="#8AACCC" font-size="10">  backup and managed identity</text>

  <text x="576" y="280" fill="#B8D4E8" font-size="10" font-weight="bold">RSC ONBOARDING</text>
  <text x="576" y="295" fill="#FFFFFF" font-size="10">&#x25B8; Add subscription in RSC UI</text>
  <text x="576" y="309" fill="#FFFFFF" font-size="10">&#x25B8; Verify resource discovery</text>
  <text x="576" y="323" fill="#8AACCC" font-size="10">  (VMs, SQL instances appear)</text>

  <!-- Arrow 2 to 3 -->
  <polygon points="53,366 60,382 67,366" fill="#4DD2D2"/>
  <line x1="60" y1="348" x2="60" y2="382" stroke="#4DD2D2" stroke-width="2"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 3: Configure Infrastructure -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="394" r="20" fill="#0A2347" stroke="#09A8B8" stroke-width="2"/>
  <text x="60" y="400" text-anchor="middle" fill="#09A8B8" font-size="15" font-weight="bold">3</text>

  <rect x="92" y="364" width="720" height="156" fill="#0D2E5A" rx="7" stroke="#1A4A7A" stroke-width="1"/>
  <rect x="92" y="364" width="720" height="34" fill="#0C3460" rx="7"/>
  <rect x="92" y="386" width="720" height="12" fill="#0C3460"/>
  <text x="112" y="386" fill="#FFFFFF" font-size="13" font-weight="bold">Configure Infrastructure</text>
  <text x="590" y="386" text-anchor="end" fill="#B8D4E8" font-size="10">Exocompute  |  Blob storage  |  Network</text>

  <!-- Exocompute sub-box -->
  <rect x="108" y="406" width="326" height="100" fill="#091D3A" rx="5" stroke="#09A8B8" stroke-width="1"/>
  <text x="122" y="423" fill="#09A8B8" font-size="11" font-weight="bold">Exocompute Cluster</text>
  <text x="122" y="439" fill="#FFFFFF" font-size="10">&#x25B8; Select Azure region (match workloads)</text>
  <text x="122" y="454" fill="#FFFFFF" font-size="10">&#x25B8; Choose worker node VM size</text>
  <text x="122" y="469" fill="#FFFFFF" font-size="10">&#x25B8; Configure VNet and subnet</text>
  <text x="122" y="484" fill="#8AACCC" font-size="10">&#x25B8; Enable shared cluster (optional)</text>
  <text x="122" y="499" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; Validate cluster is healthy</text>

  <!-- Blob storage sub-box -->
  <rect x="450" y="406" width="346" height="100" fill="#091D3A" rx="5" stroke="#2FCAFF" stroke-width="1"/>
  <text x="464" y="423" fill="#2FCAFF" font-size="11" font-weight="bold">Blob Storage Configuration</text>
  <text x="464" y="439" fill="#FFFFFF" font-size="10">&#x25B8; Create storage account in RSC</text>
  <text x="464" y="454" fill="#FFFFFF" font-size="10">&#x25B8; Set tiering policy (hot/cool/archive)</text>
  <text x="464" y="469" fill="#FFFFFF" font-size="10">&#x25B8; Apply retention locking if required</text>
  <text x="464" y="484" fill="#8AACCC" font-size="10">&#x25B8; Configure geo-redundancy</text>
  <text x="464" y="499" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; Confirm storage visible in RSC</text>

  <!-- Arrow 3 to 4 -->
  <polygon points="53,538 60,554 67,538" fill="#4DD2D2"/>
  <line x1="60" y1="520" x2="60" y2="554" stroke="#4DD2D2" stroke-width="2"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 4: Protect Workloads -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="566" r="20" fill="#0A2347" stroke="#09A8B8" stroke-width="2"/>
  <text x="60" y="572" text-anchor="middle" fill="#09A8B8" font-size="15" font-weight="bold">4</text>

  <rect x="92" y="536" width="720" height="156" fill="#0D2E5A" rx="7" stroke="#1A4A7A" stroke-width="1"/>
  <rect x="92" y="536" width="720" height="34" fill="#0C3460" rx="7"/>
  <rect x="92" y="558" width="720" height="12" fill="#0C3460"/>
  <text x="112" y="558" fill="#FFFFFF" font-size="13" font-weight="bold">Protect Workloads</text>
  <text x="590" y="558" text-anchor="end" fill="#B8D4E8" font-size="10">SLA policies  |  VM  |  SQL  |  AKS</text>

  <!-- SLA Policy sub-box -->
  <rect x="108" y="578" width="200" height="100" fill="#091D3A" rx="5" stroke="#09A8B8" stroke-width="1"/>
  <text x="122" y="595" fill="#09A8B8" font-size="11" font-weight="bold">SLA Policy Design</text>
  <text x="122" y="611" fill="#FFFFFF" font-size="10">&#x25B8; Set backup frequency</text>
  <text x="122" y="626" fill="#FFFFFF" font-size="10">&#x25B8; Define retention periods</text>
  <text x="122" y="641" fill="#FFFFFF" font-size="10">&#x25B8; Configure archival rules</text>
  <text x="122" y="656" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; Assign to resource groups</text>
  <text x="122" y="670" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; Choose replication targets</text>

  <!-- VM sub-box -->
  <rect x="320" y="578" width="148" height="100" fill="#091D3A" rx="5" stroke="#1A4A7A" stroke-width="1"/>
  <text x="334" y="595" fill="#B8D4E8" font-size="11" font-weight="bold">Azure VMs</text>
  <text x="334" y="611" fill="#FFFFFF" font-size="10">&#x25B8; VM snapshot export</text>
  <text x="334" y="626" fill="#FFFFFF" font-size="10">&#x25B8; Incremental backups</text>
  <text x="334" y="641" fill="#FFFFFF" font-size="10">&#x25B8; Crash-consistent or</text>
  <text x="334" y="656" fill="#8AACCC" font-size="10">  app-consistent</text>
  <text x="334" y="671" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; 1-click restore</text>

  <!-- SQL sub-box -->
  <rect x="480" y="578" width="148" height="100" fill="#091D3A" rx="5" stroke="#1A4A7A" stroke-width="1"/>
  <text x="494" y="595" fill="#B8D4E8" font-size="11" font-weight="bold">Azure SQL</text>
  <text x="494" y="611" fill="#FFFFFF" font-size="10">&#x25B8; SQL Server on Azure VM</text>
  <text x="494" y="626" fill="#FFFFFF" font-size="10">&#x25B8; Log shipping backups</text>
  <text x="494" y="641" fill="#FFFFFF" font-size="10">&#x25B8; Log-based point-in-time</text>
  <text x="494" y="656" fill="#8AACCC" font-size="10">  recovery</text>
  <text x="494" y="671" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; DB-level restore</text>

  <!-- AKS sub-box -->
  <rect x="640" y="578" width="156" height="100" fill="#091D3A" rx="5" stroke="#1A4A7A" stroke-width="1"/>
  <text x="654" y="595" fill="#B8D4E8" font-size="11" font-weight="bold">AKS Clusters</text>
  <text x="654" y="611" fill="#FFFFFF" font-size="10">&#x25B8; Namespace-level backup</text>
  <text x="654" y="626" fill="#FFFFFF" font-size="10">&#x25B8; PV snapshot export</text>
  <text x="654" y="641" fill="#FFFFFF" font-size="10">&#x25B8; Cross-cluster restore</text>
  <text x="654" y="656" fill="#8AACCC" font-size="10">  support</text>
  <text x="654" y="671" fill="#8AACCC" font-size="9" font-style="italic">&#x25B8; Helm chart backup</text>

  <!-- Arrow 4 to 5 -->
  <polygon points="53,710 60,726 67,710" fill="#4DD2D2"/>
  <line x1="60" y1="692" x2="60" y2="726" stroke="#4DD2D2" stroke-width="2"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 5: Monitor and Manage -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="738" r="20" fill="#0A2347" stroke="#09A8B8" stroke-width="2"/>
  <text x="60" y="744" text-anchor="middle" fill="#09A8B8" font-size="15" font-weight="bold">5</text>

  <rect x="92" y="708" width="720" height="122" fill="#0D2E5A" rx="7" stroke="#1A4A7A" stroke-width="1"/>
  <rect x="92" y="708" width="720" height="34" fill="#0C3460" rx="7"/>
  <rect x="92" y="730" width="720" height="12" fill="#0C3460"/>
  <text x="112" y="730" fill="#FFFFFF" font-size="13" font-weight="bold">Monitor and Manage</text>
  <text x="590" y="730" text-anchor="end" fill="#B8D4E8" font-size="10">Job health  |  Compliance  |  Threat detection</text>

  <text x="120" y="762" fill="#B8D4E8" font-size="10" font-weight="bold">JOB MONITORING</text>
  <text x="120" y="777" fill="#FFFFFF" font-size="10">&#x25B8; View backup job status in RSC</text>
  <text x="120" y="791" fill="#FFFFFF" font-size="10">&#x25B8; Review failed job alerts</text>
  <text x="120" y="805" fill="#8AACCC" font-size="10">  (Slack / email notifications)</text>

  <text x="348" y="762" fill="#B8D4E8" font-size="10" font-weight="bold">COMPLIANCE</text>
  <text x="348" y="777" fill="#FFFFFF" font-size="10">&#x25B8; SLA compliance dashboard</text>
  <text x="348" y="791" fill="#FFFFFF" font-size="10">&#x25B8; Protected vs. unprotected view</text>
  <text x="348" y="805" fill="#8AACCC" font-size="10">  (per subscription)</text>

  <text x="576" y="762" fill="#FFB721" font-size="10" font-weight="bold">THREAT DETECTION</text>
  <text x="576" y="777" fill="#FFFFFF" font-size="10">&#x25B8; Anomaly detection enabled</text>
  <text x="576" y="791" fill="#FFFFFF" font-size="10">&#x25B8; Ransomware blast radius</text>
  <text x="576" y="805" fill="#8AACCC" font-size="10">  analysis on alert</text>

  <!-- Arrow 5 to 6 -->
  <polygon points="53,848 60,864 67,848" fill="#21DDAA"/>
  <line x1="60" y1="830" x2="60" y2="864" stroke="#21DDAA" stroke-width="2"/>

  <!-- ═══════════════════════════════ -->
  <!-- PHASE 6: Recover -->
  <!-- ═══════════════════════════════ -->
  <circle cx="60" cy="876" r="20" fill="#0A2347" stroke="#21DDAA" stroke-width="2.5"/>
  <text x="60" y="882" text-anchor="middle" fill="#21DDAA" font-size="15" font-weight="bold">6</text>

  <rect x="92" y="846" width="720" height="146" fill="#0D3040" rx="7" stroke="#21DDAA" stroke-width="1.5"/>
  <rect x="92" y="846" width="720" height="34" fill="#0A4030" rx="7"/>
  <rect x="92" y="868" width="720" height="12" fill="#0A4030"/>
  <text x="112" y="868" fill="#FFFFFF" font-size="13" font-weight="bold">Recover</text>
  <text x="590" y="868" text-anchor="end" fill="#A8FFD8" font-size="10">File  |  VM  |  SQL  |  AKS  |  Cross-region recovery</text>

  <text x="120" y="900" fill="#A8FFD8" font-size="10" font-weight="bold">GRANULAR RESTORE</text>
  <text x="120" y="916" fill="#FFFFFF" font-size="10">&#x25B8; File and folder recovery</text>
  <text x="120" y="931" fill="#FFFFFF" font-size="10">&#x25B8; Point-in-time selection</text>
  <text x="120" y="946" fill="#8AACCC" font-size="10">&#x25B8; Live mount (instant access)</text>
  <text x="120" y="977" fill="#8AACCC" font-size="9" font-style="italic">Zero data loss for file-level</text>

  <text x="348" y="900" fill="#A8FFD8" font-size="10" font-weight="bold">FULL WORKLOAD RESTORE</text>
  <text x="348" y="916" fill="#FFFFFF" font-size="10">&#x25B8; Restore to same or alternate VNet</text>
  <text x="348" y="931" fill="#FFFFFF" font-size="10">&#x25B8; SQL DB point-in-time recovery</text>
  <text x="348" y="946" fill="#8AACCC" font-size="10">&#x25B8; AKS namespace restore</text>
  <text x="348" y="977" fill="#8AACCC" font-size="9" font-style="italic">Restore to alternate subscription</text>

  <text x="576" y="900" fill="#A8FFD8" font-size="10" font-weight="bold">CROSS-REGION RECOVERY</text>
  <text x="576" y="916" fill="#FFFFFF" font-size="10">&#x25B8; Restore from replicated copy</text>
  <text x="576" y="931" fill="#FFFFFF" font-size="10">&#x25B8; Archived data restore</text>
  <text x="576" y="946" fill="#8AACCC" font-size="10">&#x25B8; Cyber recovery vault export</text>
  <text x="576" y="977" fill="#8AACCC" font-size="9" font-style="italic">Isolated recovery environment</text>

  <!-- Footer -->
  <rect x="0" y="998" width="840" height="22" fill="#060F1E" rx="0"/>
  <rect x="0" y="1008" width="840" height="12" fill="#060F1E" rx="12"/>
  <text x="420" y="1013" text-anchor="middle" fill="#3A5A7A" font-size="9">Rubrik Security Cloud  |  Azure Native Protection  |  Implementation Workflow</text>
</svg>
