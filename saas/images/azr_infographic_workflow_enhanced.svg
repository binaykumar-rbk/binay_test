<svg xmlns="http://www.w3.org/2000/svg" width="840" height="926" viewBox="0 0 840 926" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="840" height="926" fill="#F4F7FA" rx="12"/>
  <!-- Perimeter: teal, prominent -->
  <rect width="840" height="926" fill="none" stroke="#09A8B8" stroke-width="5" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="840" height="72" fill="#0A2347" rx="12"/>
  <rect x="0" y="60" width="840" height="12" fill="#0A2347"/>
  <rect x="0" y="69" width="840" height="3" fill="#09A8B8"/>
  <text x="420" y="34" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" letter-spacing="0.3">Azure Protection &#8212; Implementation Workflow</text>
  <text x="420" y="56" text-anchor="middle" fill="#8AACCC" font-size="11">End-to-end workflow for protecting Azure workloads with Rubrik Security Cloud</text>

  <!-- Vertical connector line -->
  <line x1="60" y1="90" x2="60" y2="880" stroke="#B0C8E0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 1: Plan Your Azure Protection (y=88, h=78) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="88" width="728" height="78" fill="#FFFFFF" rx="8" stroke="#C8D8E8" stroke-width="1"/>
  <rect x="88" y="88" width="728" height="36" fill="#075F68" rx="8"/>
  <rect x="88" y="112" width="728" height="12" fill="#075F68"/>
  <text x="452" y="112" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 1: Plan Your Azure Protection</text>
  <circle cx="60" cy="118" r="22" fill="#F4F7FA" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="124" text-anchor="middle" fill="#09A8B8" font-size="16" font-weight="bold">1</text>
  <text x="452" y="146" text-anchor="middle" fill="#4A6A8A" font-size="10">Understand RSC capabilities, plan user access, and review necessary permissions.</text>

  <!-- Arrow 1 to 2 -->
  <line x1="60" y1="166" x2="60" y2="190" stroke="#B0C8E0" stroke-width="2"/>
  <polygon points="53,186 60,194 67,186" fill="#09A8B8"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 2: Set Up Azure Cloud Accounts (y=194, h=78) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="194" width="728" height="78" fill="#FFFFFF" rx="8" stroke="#C8D8E8" stroke-width="1"/>
  <rect x="88" y="194" width="728" height="36" fill="#0C3460" rx="8"/>
  <rect x="88" y="218" width="728" height="12" fill="#0C3460"/>
  <text x="452" y="218" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 2: Set Up Azure Cloud Accounts</text>
  <circle cx="60" cy="224" r="22" fill="#F4F7FA" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="230" text-anchor="middle" fill="#09A8B8" font-size="16" font-weight="bold">2</text>
  <text x="452" y="252" text-anchor="middle" fill="#4A6A8A" font-size="10">Connect RSC to your Azure subscription by configuring the chosen authentication method.</text>

  <!-- Arrow 2 to 3 -->
  <line x1="60" y1="272" x2="60" y2="296" stroke="#B0C8E0" stroke-width="2"/>
  <polygon points="53,292 60,300 67,292" fill="#09A8B8"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 3: Configure Core Infrastructure (y=300, h=140) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="300" width="728" height="140" fill="#FFFFFF" rx="8" stroke="#C8D8E8" stroke-width="1"/>
  <rect x="88" y="300" width="728" height="36" fill="#0C3460" rx="8"/>
  <rect x="88" y="324" width="728" height="12" fill="#0C3460"/>
  <text x="452" y="324" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 3: Configure Core Infrastructure</text>
  <circle cx="60" cy="330" r="22" fill="#F4F7FA" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="336" text-anchor="middle" fill="#09A8B9" font-size="16" font-weight="bold">3</text>
  <text x="452" y="358" text-anchor="middle" fill="#4A6A8A" font-size="10">Configure the underlying Rubrik components within Azure.</text>
  <!-- Sub-boxes -->
  <rect x="108" y="370" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="389" text-anchor="middle" fill="#1A2A3A" font-size="10">3.a Set Up Exocompute on Azure</text>
  <rect x="108" y="404" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="423" text-anchor="middle" fill="#1A2A3A" font-size="10">3.b Set Up Azure Storage Tiering</text>

  <!-- Arrow 3 to 4 -->
  <line x1="60" y1="440" x2="60" y2="464" stroke="#B0C8E0" stroke-width="2"/>
  <polygon points="53,460 60,468 67,460" fill="#09A8B8"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 4: Configure Azure Protection (y=468, h=78) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="468" width="728" height="78" fill="#FFFFFF" rx="8" stroke="#C8D8E8" stroke-width="1"/>
  <rect x="88" y="468" width="728" height="36" fill="#0C3460" rx="8"/>
  <rect x="88" y="492" width="728" height="12" fill="#0C3460"/>
  <text x="452" y="492" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 4: Configure Azure Protection</text>
  <circle cx="60" cy="498" r="22" fill="#F4F7FA" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="504" text-anchor="middle" fill="#09A8B8" font-size="16" font-weight="bold">4</text>
  <text x="452" y="524" text-anchor="middle" fill="#4A6A8A" font-size="10">Define protection policies (SLA Domains) and assign them to Azure workloads for automated backups.</text>

  <!-- Arrow 4 to 5 -->
  <line x1="60" y1="546" x2="60" y2="570" stroke="#B0C8E0" stroke-width="2"/>
  <polygon points="53,566 60,574 67,566" fill="#09A8B8"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 5: Manage Azure Workloads (y=574, h=200) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="574" width="728" height="200" fill="#FFFFFF" rx="8" stroke="#C8D8E8" stroke-width="1"/>
  <rect x="88" y="574" width="728" height="36" fill="#075F68" rx="8"/>
  <rect x="88" y="598" width="728" height="12" fill="#075F68"/>
  <text x="452" y="598" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 5: Manage Azure Workloads</text>
  <circle cx="60" cy="604" r="22" fill="#F4F7FA" stroke="#09A8B8" stroke-width="2.5"/>
  <text x="60" y="610" text-anchor="middle" fill="#09A8B8" font-size="16" font-weight="bold">5</text>
  <text x="452" y="632" text-anchor="middle" fill="#4A6A8A" font-size="10">Use dashboards to track status, review logs, and continuously optimize the configuration.</text>
  <!-- Sub-boxes -->
  <rect x="108" y="644" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="663" text-anchor="middle" fill="#1A2A3A" font-size="10">5.a Manage Azure Virtual Machines</text>
  <rect x="108" y="678" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="697" text-anchor="middle" fill="#1A2A3A" font-size="10">5.b Manage Azure Blob Storage</text>
  <rect x="108" y="712" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="731" text-anchor="middle" fill="#1A2A3A" font-size="10">5.c Manage Azure SQL Databases</text>
  <rect x="108" y="746" width="700" height="28" fill="#EEF4FA" rx="5" stroke="#C8D8E8" stroke-width="1"/>
  <text x="452" y="765" text-anchor="middle" fill="#1A2A3A" font-size="10">5.d Manage Azure SQL Managed Instances</text>

  <!-- Arrow 5 to 6 (green) -->
  <line x1="60" y1="774" x2="60" y2="798" stroke="#B0C8E0" stroke-width="2"/>
  <polygon points="53,794 60,802 67,794" fill="#21DDAA"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PHASE 6: Recover Azure Workloads (y=802, h=78) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="88" y="802" width="728" height="78" fill="#FFFFFF" rx="8" stroke="#21DDAA" stroke-width="1.5"/>
  <rect x="88" y="802" width="728" height="36" fill="#0A4030" rx="8"/>
  <rect x="88" y="826" width="728" height="12" fill="#0A4030"/>
  <text x="452" y="826" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Phase 6: Recover Azure Workloads</text>
  <circle cx="60" cy="832" r="22" fill="#F4F7FA" stroke="#21DDAA" stroke-width="2.5"/>
  <text x="60" y="838" text-anchor="middle" fill="#21DDAA" font-size="16" font-weight="bold">6</text>
  <text x="452" y="860" text-anchor="middle" fill="#4A6A8A" font-size="10">Perform granular or full recoveries for Azure workloads.</text>

  <!-- Footer -->
  <rect x="0" y="904" width="840" height="22" fill="#0A2347" rx="0"/>
  <rect x="0" y="914" width="840" height="12" fill="#0A2347" rx="12"/>
  <text x="420" y="919" text-anchor="middle" fill="#4A7A9A" font-size="9">Rubrik Security Cloud  |  Azure Native Protection  |  Implementation Workflow</text>

</svg>
