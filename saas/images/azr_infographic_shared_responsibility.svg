<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 630" width="920" height="630" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="630" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="920" height="70" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="54" width="920" height="16" fill="#1B2A4A"/>
  <text x="460" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#FFFFFF">Shared Responsibility Model for Azure Data Protection</text>
  <text x="460" y="54" text-anchor="middle" font-size="12" fill="#8BB8E8">Microsoft secures the infrastructure. You manage your workloads. Rubrik protects your data.</text>

  <!-- ═══════════════ COLUMN 1: Microsoft Azure ═══════════════ -->
  <rect x="24" y="85" width="274" height="495" fill="#FFFFFF" rx="8" stroke="#0078D4" stroke-width="2"/>
  <!-- Header -->
  <rect x="24" y="85" width="274" height="58" fill="#0078D4" rx="8"/>
  <rect x="24" y="120" width="274" height="23" fill="#0078D4"/>
  <text x="161" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Microsoft Azure</text>
  <text x="161" y="131" text-anchor="middle" font-size="11" fill="#C8E0FF">Secures the infrastructure</text>
  <!-- Divider -->
  <line x1="44" y1="153" x2="278" y2="153" stroke="#E3F0FD" stroke-width="1"/>
  <!-- Items -->
  <circle cx="52" cy="177" r="6" fill="#0078D4"/>
  <text x="68" y="182" font-size="12" fill="#1B2A4A">Physical data centers</text>
  <circle cx="52" cy="208" r="6" fill="#0078D4"/>
  <text x="68" y="213" font-size="12" fill="#1B2A4A">Network infrastructure</text>
  <circle cx="52" cy="239" r="6" fill="#0078D4"/>
  <text x="68" y="244" font-size="12" fill="#1B2A4A">Hypervisor &amp; compute fabric</text>
  <circle cx="52" cy="270" r="6" fill="#0078D4"/>
  <text x="68" y="275" font-size="12" fill="#1B2A4A">Storage hardware</text>
  <circle cx="52" cy="301" r="6" fill="#0078D4"/>
  <text x="68" y="306" font-size="12" fill="#1B2A4A">Global availability zones</text>
  <circle cx="52" cy="332" r="6" fill="#0078D4"/>
  <text x="68" y="337" font-size="12" fill="#1B2A4A">Platform redundancy</text>
  <circle cx="52" cy="363" r="6" fill="#0078D4"/>
  <text x="68" y="368" font-size="12" fill="#1B2A4A">Azure service uptime SLAs</text>
  <!-- NOT responsible label -->
  <rect x="34" y="400" width="254" height="62" fill="#FFF3CD" rx="6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="161" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B5E00">Azure does NOT protect:</text>
  <text x="161" y="438" text-anchor="middle" font-size="11" fill="#7B5E00">Your data contents or application</text>
  <text x="161" y="454" text-anchor="middle" font-size="11" fill="#7B5E00">state after deployment</text>

  <!-- ═══════════════ COLUMN 2: Customer ═══════════════ -->
  <rect x="323" y="85" width="274" height="495" fill="#FFFFFF" rx="8" stroke="#5C4F9E" stroke-width="2"/>
  <!-- Header -->
  <rect x="323" y="85" width="274" height="58" fill="#5C4F9E" rx="8"/>
  <rect x="323" y="120" width="274" height="23" fill="#5C4F9E"/>
  <text x="460" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">You (Customer)</text>
  <text x="460" y="131" text-anchor="middle" font-size="11" fill="#D4C8FF">Manage workloads, data &amp; access</text>
  <!-- Divider -->
  <line x1="343" y1="153" x2="577" y2="153" stroke="#EDE7F6" stroke-width="1"/>
  <!-- Items -->
  <circle cx="351" cy="177" r="6" fill="#5C4F9E"/>
  <text x="367" y="182" font-size="12" fill="#1B2A4A">Virtual machines &amp; managed disks</text>
  <circle cx="351" cy="208" r="6" fill="#5C4F9E"/>
  <text x="367" y="213" font-size="12" fill="#1B2A4A">Azure Blob Storage data</text>
  <circle cx="351" cy="239" r="6" fill="#5C4F9E"/>
  <text x="367" y="244" font-size="12" fill="#1B2A4A">Azure SQL databases &amp; MI</text>
  <circle cx="351" cy="270" r="6" fill="#5C4F9E"/>
  <text x="367" y="275" font-size="12" fill="#1B2A4A">Identity &amp; access management</text>
  <circle cx="351" cy="301" r="6" fill="#5C4F9E"/>
  <text x="367" y="306" font-size="12" fill="#1B2A4A">OS patching &amp; configuration</text>
  <circle cx="351" cy="332" r="6" fill="#5C4F9E"/>
  <text x="367" y="337" font-size="12" fill="#1B2A4A">Application configuration</text>
  <circle cx="351" cy="363" r="6" fill="#5C4F9E"/>
  <text x="367" y="368" font-size="12" fill="#1B2A4A">Data classification &amp; compliance</text>
  <!-- Gap label -->
  <rect x="333" y="400" width="254" height="62" fill="#FFEBEE" rx="6" stroke="#EF5350" stroke-width="1.5"/>
  <text x="460" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">The protection gap:</text>
  <text x="460" y="438" text-anchor="middle" font-size="11" fill="#B71C1C">Ransomware, accidental deletion,</text>
  <text x="460" y="454" text-anchor="middle" font-size="11" fill="#B71C1C">and data loss are your responsibility</text>

  <!-- ═══════════════ COLUMN 3: Rubrik RSC ═══════════════ -->
  <rect x="622" y="85" width="274" height="495" fill="#FFFFFF" rx="8" stroke="#0076CE" stroke-width="2"/>
  <!-- Header -->
  <rect x="622" y="85" width="274" height="58" fill="#0076CE" rx="8"/>
  <rect x="622" y="120" width="274" height="23" fill="#0076CE"/>
  <text x="759" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Rubrik</text>
  <text x="759" y="131" text-anchor="middle" font-size="11" fill="#BAD9F5">Protects and recovers your data</text>
  <!-- Divider -->
  <line x1="642" y1="153" x2="876" y2="153" stroke="#E8F4FF" stroke-width="1"/>
  <!-- Items -->
  <circle cx="650" cy="177" r="6" fill="#0076CE"/>
  <text x="666" y="182" font-size="12" fill="#1B2A4A">Automated SLA Domain backups</text>
  <circle cx="650" cy="208" r="6" fill="#0076CE"/>
  <text x="666" y="213" font-size="12" fill="#1B2A4A">Immutable backup copies</text>
  <circle cx="650" cy="239" r="6" fill="#0076CE"/>
  <text x="666" y="244" font-size="12" fill="#1B2A4A">Cross-region snapshot replication</text>
  <circle cx="650" cy="270" r="6" fill="#0076CE"/>
  <text x="666" y="275" font-size="12" fill="#1B2A4A">Storage tiering &amp; archival</text>
  <circle cx="650" cy="301" r="6" fill="#0076CE"/>
  <text x="666" y="306" font-size="12" fill="#1B2A4A">Ransomware &amp; anomaly detection</text>
  <circle cx="650" cy="332" r="6" fill="#0076CE"/>
  <text x="666" y="337" font-size="12" fill="#1B2A4A">Fast granular recovery options</text>
  <circle cx="650" cy="363" r="6" fill="#0076CE"/>
  <text x="666" y="368" font-size="12" fill="#1B2A4A">Compliance &amp; audit reporting</text>
  <!-- Solves it label -->
  <rect x="632" y="400" width="254" height="62" fill="#E8F5E9" rx="6" stroke="#43A047" stroke-width="1.5"/>
  <text x="759" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Rubrik closes this gap:</text>
  <text x="759" y="438" text-anchor="middle" font-size="11" fill="#1B5E20">Policy-driven protection ensures data</text>
  <text x="759" y="454" text-anchor="middle" font-size="11" fill="#1B5E20">is recoverable at any point in time</text>

  <!-- Bottom connector lines: start below callout boxes (y=475), exit column borders,
       meet the horizontal bar placed clearly below all columns (columns end at y=580) -->
  <line x1="161" y1="475" x2="161" y2="596" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="475" x2="460" y2="596" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="759" y1="475" x2="759" y2="596" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Bottom connector bar: sits 16px below column bottoms (y=580+16=596) -->
  <line x1="161" y1="596" x2="759" y2="596" stroke="#0076CE" stroke-width="2.5"/>
  <!-- Arrow at end -->
  <polygon points="754,590 766,596 754,602" fill="#0076CE"/>
  <!-- Bottom label: 22px below the bar, clear of all borders -->
  <text x="460" y="620" text-anchor="middle" font-size="12" fill="#1B2A4A">Together, these three layers form a complete data protection strategy for Azure workloads.</text>

</svg>
