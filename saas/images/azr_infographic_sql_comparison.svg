<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620"
     font-family="Segoe UI, Calibri, Arial, sans-serif">
  <rect width="960" height="620" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="64" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="48" width="960" height="16" fill="#1B2A4A"/>
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Azure SQL Workloads: Database vs. Managed Instance</text>
  <text x="480" y="51" text-anchor="middle" font-size="11" fill="#8BB8E8">Both workload types are supported by RSC. Key differences apply to connectivity, credential setup, and backup approach.</text>

  <!-- Column labels -->
  <rect x="14" y="76" width="450" height="44" fill="#0078D4" rx="6"/>
  <text x="239" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Azure SQL Database (SQL DB)</text>
  <text x="239" y="114" text-anchor="middle" font-size="10" fill="#C8E0FF">Fully managed relational database service</text>

  <rect x="496" y="76" width="450" height="44" fill="#0076CE" rx="6"/>
  <text x="721" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Azure SQL Managed Instance (SQL MI)</text>
  <text x="721" y="114" text-anchor="middle" font-size="10" fill="#BAD9F5">Full SQL Server engine in a managed environment</text>

  <!-- VS divider circle -->
  <circle cx="480" cy="98" r="18" fill="#1B2A4A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="480" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">VS</text>

  <!-- ═══ Row 1: Network Connectivity (y=130) ═══ -->
  <!-- Row label -->
  <rect x="14" y="130" width="932" height="22" fill="#E8EDF2" rx="3"/>
  <text x="480" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">① Network Connectivity to Exocompute</text>

  <!-- SQL DB connectivity box -->
  <rect x="14" y="156" width="450" height="76" fill="#FFFFFF" rx="5" stroke="#0078D4" stroke-width="1.5"/>
  <text x="26" y="174" font-size="10" font-weight="bold" fill="#0078D4">Connectivity options:</text>
  <text x="26" y="191" font-size="9" fill="#333">• Service endpoint on the Azure SQL server (simpler setup)</text>
  <text x="26" y="207" font-size="9" fill="#333">• Private endpoint from the Exocompute subnet to the SQL server</text>
  <text x="26" y="221" font-size="9" fill="#555">Both route traffic through the Exocompute AKS cluster</text>

  <!-- SQL MI connectivity box -->
  <rect x="496" y="156" width="450" height="76" fill="#FFFFFF" rx="5" stroke="#0076CE" stroke-width="1.5"/>
  <text x="508" y="174" font-size="10" font-weight="bold" fill="#0076CE">Connectivity requirement:</text>
  <text x="508" y="191" font-size="9" fill="#333">• Private endpoint only — from Exocompute subnet to MI subnet</text>
  <text x="508" y="207" font-size="9" fill="#333">• MI subnet requires delegation for Microsoft.Sql/managedInstances</text>
  <text x="508" y="221" font-size="9" fill="#555">Service endpoints are not supported for SQL MI backups</text>

  <!-- ═══ Row 2: Credential Setup (y=242) ═══ -->
  <rect x="14" y="242" width="932" height="22" fill="#E8EDF2" rx="3"/>
  <text x="480" y="257" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">② Backup Credential Setup</text>

  <!-- SQL DB credentials -->
  <rect x="14" y="268" width="450" height="64" fill="#E8F5E9" rx="5" stroke="#43A047" stroke-width="1.5"/>
  <text x="26" y="286" font-size="10" font-weight="bold" fill="#2E7D32">No separate credential setup required</text>
  <text x="26" y="303" font-size="9" fill="#333">RSC uses the existing Rubrik Service Principal (already created</text>
  <text x="26" y="318" font-size="9" fill="#333">during cloud account setup) to authenticate to Azure SQL DB.</text>

  <!-- SQL MI credentials -->
  <rect x="496" y="268" width="450" height="64" fill="#FFF3E0" rx="5" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="508" y="286" font-size="10" font-weight="bold" fill="#E65100">Dedicated credential management required</text>
  <text x="508" y="303" font-size="9" fill="#333">Choose one method: OAuth (recommended), admin credentials,</text>
  <text x="508" y="318" font-size="9" fill="#333">or automated credential script. See credential management topics.</text>

  <!-- ═══ Row 3: TDE and Encryption (y=342) ═══ -->
  <rect x="14" y="342" width="932" height="22" fill="#E8EDF2" rx="3"/>
  <text x="480" y="357" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">③ TDE and Encryption Support</text>

  <!-- SQL DB TDE -->
  <rect x="14" y="368" width="450" height="60" fill="#FFFFFF" rx="5" stroke="#0078D4" stroke-width="1.5"/>
  <text x="26" y="385" font-size="10" font-weight="bold" fill="#0078D4">TDE with Customer-Managed Keys (CMK) — supported</text>
  <text x="26" y="401" font-size="9" fill="#333">Upgrade path available: configure CMK during SQL DB backup setup.</text>
  <text x="26" y="416" font-size="9" fill="#555">Requires Immutable Backups permission category for immutable storage.</text>

  <!-- SQL MI TDE -->
  <rect x="496" y="368" width="450" height="60" fill="#FFFFFF" rx="5" stroke="#0076CE" stroke-width="1.5"/>
  <text x="508" y="385" font-size="10" font-weight="bold" fill="#0076CE">TDE support inherited from the Managed Instance</text>
  <text x="508" y="401" font-size="9" fill="#333">TDE key management is handled at the MI level in Azure.</text>
  <text x="508" y="416" font-size="9" fill="#555">Requires Immutable Backups permission category for immutable storage.</text>

  <!-- ═══ Row 4: Recovery Options (y=438) ═══ -->
  <rect x="14" y="438" width="932" height="22" fill="#E8EDF2" rx="3"/>
  <text x="480" y="453" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">④ Recovery Options  (both workload types support the same options)</text>

  <!-- Shared recovery options - full width -->
  <rect x="14" y="464" width="932" height="72" fill="#E8F4FF" rx="5" stroke="#0076CE" stroke-width="1.5"/>

  <!-- 4 recovery option boxes -->
  <rect x="24" y="474" width="216" height="52" fill="#FFFFFF" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="132" y="491" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Recover to Database</text>
  <text x="132" y="506" text-anchor="middle" font-size="9" fill="#333">Export to required server</text>
  <text x="132" y="519" text-anchor="middle" font-size="9" fill="#555">from Rubrik backup</text>

  <rect x="250" y="474" width="216" height="52" fill="#FFFFFF" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="358" y="491" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Point-in-Time Restore</text>
  <text x="358" y="506" text-anchor="middle" font-size="9" fill="#333">Restore to specific point</text>
  <text x="358" y="519" text-anchor="middle" font-size="9" fill="#555">using short-term retention</text>

  <rect x="476" y="474" width="216" height="52" fill="#FFFFFF" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="584" y="491" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Export LTR Backup</text>
  <text x="584" y="506" text-anchor="middle" font-size="9" fill="#333">Recover from long-term</text>
  <text x="584" y="519" text-anchor="middle" font-size="9" fill="#555">retention backup</text>

  <rect x="702" y="474" width="218" height="52" fill="#FFFFFF" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="811" y="491" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Download BACPAC</text>
  <text x="811" y="506" text-anchor="middle" font-size="9" fill="#333">Upload BACPAC to storage</text>
  <text x="811" y="519" text-anchor="middle" font-size="9" fill="#555">account for download</text>

  <!-- ═══ Footer: Prerequisites ═══ -->
  <rect x="14" y="546" width="932" height="62" fill="#FFFFFF" rx="6" stroke="#CBD5E0" stroke-width="1"/>
  <text x="480" y="564" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B2A4A">Prerequisites for both workload types</text>
  <text x="26" y="581" font-size="9" fill="#333">• Azure cloud account must be added to RSC with the Basic permission category and the relevant SQL permission categories (Recovery, Immutable Backups).</text>
  <text x="26" y="597" font-size="9" fill="#333">• Exocompute must be configured and healthy in the subscription. SQL backup operations run on the Exocompute AKS cluster using service or private endpoints.</text>
</svg>
