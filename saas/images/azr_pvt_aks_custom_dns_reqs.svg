<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 508" width="960" height="508" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <rect width="960" height="508" fill="#F4F7FB" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="72" fill="#1B2A4A" rx="8"/>
  <rect x="0" y="56" width="960" height="16" fill="#1B2A4A"/>
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">Custom Private DNS Zone: Setup Requirements</text>
  <text x="480" y="54" text-anchor="middle" font-size="11" fill="#8BB8E8">Ensure all five requirements are in place before configuring the custom DNS zone in RSC.</text>

  <!-- Column header bar -->
  <rect x="14" y="72" width="932" height="22" fill="#E3EAF4"/>
  <text x="130" y="87" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">REQUIREMENT</text>
  <text x="587" y="87" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B2A4A">DETAILS</text>

  <!-- Row backgrounds -->
  <rect x="14" y="94"  width="932" height="72"  fill="#FFFFFF"/>
  <rect x="14" y="166" width="932" height="102" fill="#F8FAFB"/>
  <rect x="14" y="268" width="932" height="72"  fill="#FFFFFF"/>
  <rect x="14" y="340" width="932" height="78"  fill="#F8FAFB"/>
  <rect x="14" y="418" width="932" height="82"  fill="#FFFFFF"/>

  <!-- ─────── ROW 1: DNS Zone Naming (y=94, h=72) ─────── -->
  <circle cx="46" cy="130" r="14" fill="#1565C0"/>
  <text x="46" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="70" y="124" font-size="10" font-weight="bold" fill="#1565C0">DNS Zone</text>
  <text x="70" y="138" font-size="10" font-weight="bold" fill="#1565C0">Naming</text>
  <text x="240" y="116" font-size="10" fill="#333">Name the DNS zone using one of the following formats, as required by Azure:</text>
  <text x="240" y="134" font-size="10" fill="#333">•  privatelink.&lt;region&gt;.azmk8s.io</text>
  <text x="240" y="152" font-size="10" fill="#333">•  &lt;subzone&gt;.privatelink.&lt;region&gt;.azmk8s.io</text>

  <!-- ─────── ROW 2: DNS Zone Location (y=166, h=102) ─────── -->
  <circle cx="46" cy="217" r="14" fill="#2E7D32"/>
  <text x="46" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="70" y="211" font-size="10" font-weight="bold" fill="#2E7D32">DNS Zone</text>
  <text x="70" y="225" font-size="10" font-weight="bold" fill="#2E7D32">Location</text>
  <!-- OAuth sub-box -->
  <rect x="240" y="174" width="326" height="38" fill="#E8F5E9" rx="4" stroke="#43A047" stroke-width="1"/>
  <text x="252" y="190" font-size="9" font-weight="bold" fill="#2E7D32">OAuth method</text>
  <text x="252" y="204" font-size="9" fill="#333">Zone must be in the same subscription as Exocompute.</text>
  <!-- Manual sub-box -->
  <rect x="578" y="174" width="360" height="38" fill="#E3F2FD" rx="4" stroke="#1E88E5" stroke-width="1"/>
  <text x="590" y="190" font-size="9" font-weight="bold" fill="#1565C0">Manual / Configure without OAuth</text>
  <text x="590" y="204" font-size="9" fill="#333">Zone can reside in a different subscription.</text>
  <!-- Recommendation note -->
  <text x="240" y="230" font-size="9" fill="#555">Rubrik recommends placing the DNS zone in the Exocompute subscription to simplify permission management and align with the</text>
  <text x="240" y="244" font-size="9" fill="#555">principle of least privilege. For cross-subscription scenarios, see <tspan font-style="italic">Using a DNS zone from a different subscription</tspan> in this topic.</text>
  <text x="240" y="258" font-size="9" fill="#555">This avoids the need for complex, cross-subscription role assignments.</text>

  <!-- ─────── ROW 3: VNet Linkage (y=268, h=72) ─────── -->
  <circle cx="46" cy="304" r="14" fill="#E65100"/>
  <text x="46" y="309" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="70" y="298" font-size="10" font-weight="bold" fill="#E65100">VNet</text>
  <text x="70" y="312" font-size="10" font-weight="bold" fill="#E65100">Linkage</text>
  <text x="240" y="290" font-size="10" fill="#333">Link the DNS zone to the Exocompute VNet (spoke VNet).</text>
  <text x="240" y="308" font-size="10" fill="#333">If the Exocompute VNet uses a custom DNS server, also link the DNS zone to the VNet hosting that server</text>
  <text x="240" y="326" font-size="10" fill="#333">(typically the hub VNet in a hub-and-spoke model).</text>

  <!-- ─────── ROW 4: DNS Server Forwarding (y=340, h=78) ─────── -->
  <circle cx="46" cy="379" r="14" fill="#6A1B9A"/>
  <text x="46" y="384" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="70" y="367" font-size="10" font-weight="bold" fill="#6A1B9A">DNS Server</text>
  <text x="70" y="381" font-size="10" font-weight="bold" fill="#6A1B9A">Forwarding</text>
  <text x="70" y="397" font-size="9" font-style="italic" fill="#888">(if custom DNS)</text>
  <text x="240" y="362" font-size="10" fill="#333">Required only if the Exocompute VNet uses a custom DNS server. Configure the server to forward all DNS queries</text>
  <text x="240" y="378" font-size="10" fill="#333">for privatelink.&lt;region&gt;.azmk8s.io to the Azure DNS service:</text>
  <text x="240" y="398" font-size="10" font-weight="bold" fill="#6A1B9A">privatelink.*.azmk8s.io  →  168.63.129.16  (Azure DNS)</text>

  <!-- ─────── ROW 5: RSC Permission Group (y=418, h=82) ─────── -->
  <circle cx="46" cy="459" r="14" fill="#00695C"/>
  <text x="46" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="70" y="446" font-size="10" font-weight="bold" fill="#00695C">RSC</text>
  <text x="70" y="460" font-size="10" font-weight="bold" fill="#00695C">Permission</text>
  <text x="70" y="474" font-size="10" font-weight="bold" fill="#00695C">Group</text>
  <text x="240" y="440" font-size="10" fill="#333">Enable the <tspan font-weight="bold">AKS custom private DNS zone</tspan> permission group on the Azure cloud account used for Exocompute.</text>
  <text x="240" y="458" font-size="10" fill="#555">Default scope: subscription level (OAuth method).</text>
  <text x="240" y="474" font-size="10" fill="#555">Manual / Configure without OAuth: permissions can be scoped directly to the DNS zone resource,</text>
  <text x="240" y="490" font-size="10" fill="#555">rather than granting broad access to the entire subscription.</text>

  <!-- Vertical column divider (drawn last, on top of backgrounds) -->
  <line x1="228" y1="72" x2="228" y2="500" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Horizontal row dividers -->
  <line x1="14" y1="166" x2="946" y2="166" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="14" y1="268" x2="946" y2="268" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="14" y1="340" x2="946" y2="340" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="14" y1="418" x2="946" y2="418" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Outer table border -->
  <rect x="14" y="72" width="932" height="428" fill="none" stroke="#CBD5E0" stroke-width="1"/>
</svg>
