<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 0 900 980" width="900" height="980">

  <defs>
    <style>
      .phase-hd { fill: #0d0e1e; }
